<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Russian Reading Fluency</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1410;--paper:#f5f0e8;--p2:#ede6d6;
  --gold:#c8922a;--gl:#e8b84b;
  --red:#8b2020;--green:#1e5c2e;--blue:#1a3a6b;
  --orange:#b05010;--orange-l:#e87030;
  --muted:#7a6f60;--card:#faf7f2;--border:#d4c9b0;
}
body{background:var(--paper);color:var(--ink);font-family:'Source Serif 4',Georgia,serif;min-height:100vh}
.app{max-width:880px;margin:0 auto;padding:0 14px 60px}
.header{text-align:center;padding:26px 0 18px;border-bottom:2px solid var(--border);margin-bottom:22px}
.eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.header h1{font-family:'Playfair Display',serif;font-size:clamp(22px,5vw,38px);line-height:1.1;margin-bottom:6px}
.header h1 span{color:var(--gold)}
.header-sub{font-size:13px;color:var(--muted);font-style:italic}
.nav{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:22px;border-bottom:1px solid var(--border);padding-bottom:12px}
.nav-btn{padding:7px 11px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);border-radius:2px;cursor:pointer;font-family:'Source Serif 4',serif;font-size:11px;transition:all .18s;display:flex;align-items:center;gap:4px;-webkit-tap-highlight-color:transparent;user-select:none}
.nav-btn:hover{border-color:var(--gold);color:var(--ink)}
.nav-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.nav-btn.run-tab{border-color:var(--red);color:var(--red)}
.nav-btn.run-tab.active{background:var(--red);color:#fff;border-color:var(--red)}
.module{display:none}.module.active{display:block}
.level-bar{display:flex;gap:6px;margin-bottom:18px;align-items:center;flex-wrap:wrap}
.level-bar label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-right:4px}
.lbtn{padding:5px 14px;border:1.5px solid var(--border);background:none;border-radius:20px;font-size:12px;cursor:pointer;font-family:'Source Serif 4',serif;color:var(--muted);transition:all .15s}
.lbtn.l1.on{background:var(--green);color:#fff;border-color:var(--green)}
.lbtn.l2.on{background:#7a5000;color:#fff;border-color:#7a5000}
.lbtn.l3.on{background:var(--red);color:#fff;border-color:var(--red)}
.stage{background:var(--ink);border-radius:6px;padding:32px 20px;text-align:center;margin-bottom:18px;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.stage-cyr{font-family:'Playfair Display',serif;color:var(--gl);line-height:1.1}
.stage-sub{font-size:12px;color:rgba(255,255,255,.35);margin-top:8px;font-style:italic}
.stage-roman{font-size:16px;letter-spacing:2px;color:var(--gl);margin-top:6px;font-weight:600}
.stage-en{font-size:13px;color:rgba(255,255,255,.5);margin-top:4px;font-style:italic}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.hear-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border:1.5px solid var(--gold);background:#fff9ee;border-radius:20px;cursor:pointer;font-size:13px;color:var(--gold);font-family:'Source Serif 4',serif;transition:all .15s;-webkit-tap-highlight-color:transparent}
.hear-btn:hover,.hear-btn.on{background:var(--gold);color:#fff}
.mic-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border:2px solid var(--orange);background:#fff5ee;border-radius:20px;cursor:pointer;font-size:13px;color:var(--orange);font-family:'Source Serif 4',serif;font-weight:600;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none}
.mic-btn:hover{background:var(--orange);color:#fff}
.mic-btn.active{background:var(--orange);color:#fff;animation:micPulse .7s ease-in-out infinite}
@keyframes micPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.75;transform:scale(.97)}}
.hint-btn{display:inline-flex;align-items:center;gap:4px;padding:7px 13px;border:1.5px dashed var(--border);background:none;border-radius:20px;cursor:pointer;font-size:12px;color:var(--muted);font-family:'Source Serif 4',serif;transition:all .15s}
.hint-btn:hover{border-color:var(--gold);color:var(--gold)}
.mic-result{padding:12px 15px;border-radius:4px;font-size:14px;line-height:1.6;margin-top:6px}
.mic-result.great{background:#e8f7ee;border:1.5px solid var(--green);color:var(--green)}
.mic-result.close{background:#fff9ee;border:1.5px solid var(--gold);color:#7a5000}
.mic-result.miss{background:#ffeaea;border:1.5px solid var(--red);color:var(--red)}
.mic-score{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;display:inline-block;margin-right:8px}
.mic-heard{font-size:12px;opacity:.8;margin-top:3px}
.nav-row{display:flex;align-items:center;gap:8px;margin-top:14px}
.nav-ctr{font-size:12px;color:var(--muted);flex:1;text-align:center}
.btn{padding:8px 18px;border:2px solid;border-radius:2px;cursor:pointer;font-family:'Source Serif 4',serif;font-size:13px;transition:all .15s;font-weight:600;-webkit-tap-highlight-color:transparent}
.btn-ink{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn-ink:hover{background:#2d2418}
.btn-out{background:none;color:var(--ink);border-color:var(--border)}
.btn-out:hover{border-color:var(--gold);color:var(--gold)}
.btn-red{background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm{padding:5px 13px;font-size:12px}
.btn:disabled{opacity:.35;cursor:default}
.btn-ghost{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;font-family:'Source Serif 4',serif;padding:4px 0}
.pbar-wrap{width:100%;background:var(--border);height:3px;border-radius:2px;margin-bottom:5px}
.pbar-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}
.ctr{font-size:11px;color:var(--muted);text-align:right;margin-bottom:8px}
.stitle{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:4px}
.sdesc{font-size:13px;color:var(--muted);margin-bottom:16px;font-style:italic;line-height:1.5}
.info-box{background:var(--p2);border-radius:3px;padding:11px 14px;margin-bottom:14px;font-size:13px;line-height:1.6}
/* letter grid */
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:7px;margin-bottom:16px}
.lcard{background:var(--card);border:1.5px solid var(--border);border-radius:3px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s;user-select:none}
.lcard:hover,.lcard.sel{border-color:var(--gold);background:#fff9ee}
.lcard.done{border-color:var(--green);background:#f0fbf4}
.lcard-cyr{font-family:'Playfair Display',serif;font-size:26px;line-height:1}
.lcard-rom{font-size:10px;color:var(--gold);font-weight:600;margin-top:2px}
.lcard-chk{font-size:10px;color:var(--green);margin-top:1px}
/* flash timer */
.ftbar-wrap{width:100%;background:rgba(255,255,255,.08);height:5px;border-radius:3px;overflow:hidden;margin-bottom:18px}
.ftbar{height:100%;background:var(--gl);border-radius:3px}
.ftbar.red{background:#ff5555}
/* run */
.run-bg{background:linear-gradient(160deg,#1a0e08,#0e0804);border-radius:6px;padding:22px 18px;min-height:200px}
.run-title{font-family:'Playfair Display',serif;color:var(--gl);font-size:28px;text-align:center;margin-bottom:4px}
.run-sub{color:rgba(255,255,255,.4);font-size:12px;text-align:center;margin-bottom:20px;font-style:italic}
.run-hud{display:flex;gap:14px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.run-avg{font-family:'Playfair Display',serif;font-size:22px;color:var(--gl)}
.run-streak{font-size:13px;color:rgba(255,255,255,.5)}.run-streak strong{color:var(--orange-l)}
.run-num{font-size:11px;color:rgba(255,255,255,.3);margin-left:auto}
.run-stage{background:rgba(255,255,255,.05);border:1px solid rgba(255,165,40,.15);border-radius:4px;padding:22px 16px;text-align:center;margin-bottom:14px}
.run-cyr{font-family:'Playfair Display',serif;font-size:clamp(28px,7vw,52px);color:#fff;line-height:1.2;margin-bottom:6px}
.run-tag{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,165,40,.5);margin-bottom:10px}
.run-result{margin-top:10px;font-size:13px;padding:8px 12px;border-radius:3px}
.run-result.great{background:rgba(30,92,46,.3);color:#6ddb88}
.run-result.close{background:rgba(180,120,0,.25);color:#ffc060}
.run-result.miss{background:rgba(139,32,32,.3);color:#ff7070}
.run-next{display:block;width:100%;padding:10px;background:var(--orange-l);border:none;border-radius:3px;cursor:pointer;font-family:'Source Serif 4',serif;font-size:14px;font-weight:600;color:#fff;margin-top:10px;transition:background .15s}
.run-next:hover{background:#d06020}
.run-mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:18px}
.run-mc{padding:14px 12px;border:1.5px solid rgba(255,165,40,.25);border-radius:4px;cursor:pointer;background:rgba(255,255,255,.04);text-align:center;transition:all .15s}
.run-mc:hover{border-color:var(--orange-l);background:rgba(255,107,43,.08)}
.run-mc-icon{font-size:24px;margin-bottom:5px}
.run-mc-label{color:var(--gl);font-size:13px;font-weight:600;margin-bottom:3px}
.run-mc-desc{color:rgba(255,255,255,.4);font-size:11px;line-height:1.4}
.run-grade{font-family:'Playfair Display',serif;font-size:72px;margin-bottom:4px;text-align:center}
.run-final-score{color:var(--gl);font-size:24px;font-weight:600;margin-bottom:8px;text-align:center}
.run-final-sub{color:rgba(255,255,255,.45);font-size:13px;margin-bottom:16px;text-align:center}
.done-wrap{text-align:center;padding:36px 16px}
.done-star{font-size:48px;margin-bottom:12px}
.done-title{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:10px}
/* local-url banner */
.local-banner{background:linear-gradient(135deg,#2a1000,#1a0800);border:1.5px solid var(--orange);border-radius:6px;padding:16px 18px;margin-bottom:20px}
.local-banner-title{font-family:'Playfair Display',serif;color:var(--gl);font-size:15px;margin-bottom:8px}
.local-banner-body{font-size:12px;color:rgba(255,255,255,.55);line-height:1.6;margin-bottom:12px}
.local-steps{list-style:none;margin:0;padding:0}
.local-steps li{display:flex;gap:9px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:12px;color:rgba(255,255,255,.65);line-height:1.5}
.local-steps li:last-child{border-bottom:none}
.ls-num{background:var(--orange);color:#fff;border-radius:50%;width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-top:1px}
.ls-code{background:rgba(0,0,0,.4);padding:1px 6px;border-radius:3px;color:#ffc060;font-family:monospace;font-size:12px}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
/* ultra mode — timer bar and combo flash */
.ultra-timer-wrap{width:100%;background:rgba(255,255,255,.08);height:5px;border-radius:3px;overflow:hidden;margin-bottom:14px}
.ultra-timer-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--orange),var(--gl));transition:width 1s linear}
.ultra-timer-bar.warn{background:#cc2200;animation:timerWarn .5s ease-in-out infinite}
@keyframes timerWarn{0%,100%{opacity:1}50%{opacity:.45}}
.combo-flash{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-family:'Playfair Display',serif;font-size:60px;color:var(--gl);text-shadow:0 0 30px rgba(200,146,42,.8);pointer-events:none;animation:comboAnim .8s ease forwards;z-index:999}
@keyframes comboAnim{0%{opacity:1;transform:translate(-50%,-60%)}100%{opacity:0;transform:translate(-50%,-110%)}}
@media(max-width:480px){.lgrid{grid-template-columns:repeat(auto-fill,minmax(58px,1fr))}.run-mgrid{grid-template-columns:1fr}.controls{gap:6px}}
/* Inline translation box */
.trans-box{background:var(--p2);border:1.5px solid var(--border);border-radius:3px;padding:10px 14px;margin-top:10px}
.trans-box-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.trans-box-text{font-family:'Source Serif 4',Georgia,serif;font-size:14px;color:var(--ink);font-style:italic;line-height:1.5}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="eyebrow">Reading Fluency Course</div>
    <h1>Speaking <span>Russian</span></h1>
    <div class="header-sub">See Cyrillic — produce the sound — check with your voice</div>
  </div>
  <nav class="nav" id="nav"></nav>
  <div id="modules"></div>
</div>

<script>
// ── TTS ───────────────────────────────────────────────────────────────────────
var _vx=[],_vok=false;
function _lv(){var v=window.speechSynthesis?window.speechSynthesis.getVoices():[];if(v.length){_vx=v;_vok=true;}}
if(window.speechSynthesis){_lv();window.speechSynthesis.onvoiceschanged=_lv;var _vt=setInterval(function(){_lv();if(_vok)clearInterval(_vt);},200);setTimeout(function(){clearInterval(_vt);},5000);}
function _ru(){return _vx.find(function(v){return v.lang==='ru-RU';})||_vx.find(function(v){return v.lang.startsWith('ru');})||null;}
function say(txt,rate){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();setTimeout(function(){var u=new SpeechSynthesisUtterance(txt);u.lang='ru-RU';u.rate=rate||0.85;u.pitch=1;var r=_ru();if(r)u.voice=r;window.speechSynthesis.speak(u);},55);}
function hearBtn(txt,rate,lbl){
  var b=document.createElement('button');
  b.className='hear-btn';
  b.innerHTML='🔊 '+(lbl||'Hear');
  var _playing=false;
  var _endTimer=null;
  function _markDone(){
    _playing=false;
    if(_endTimer){clearTimeout(_endTimer);_endTimer=null;}
    b.classList.remove('on');
  }
  b.onclick=function(e){
    e.stopPropagation();
    if(_playing){
      // Currently playing — stop it
      window.speechSynthesis.cancel();
      _markDone();
      return;
    }
    // Not playing — start (or restart)
    _playing=true;
    b.classList.add('on');
    window.speechSynthesis.cancel();
    setTimeout(function(){
      var u=new SpeechSynthesisUtterance(txt);
      u.lang='ru-RU';u.rate=rate||0.85;u.pitch=1;
      var r=_ru();if(r)u.voice=r;
      u.onend=function(){_markDone();};
      u.onerror=function(){_markDone();};
      // Fallback timeout in case onend never fires (some Android browsers)
      var estMs=Math.max(2000,txt.length*(rate?800/rate:940))+800;
      _endTimer=setTimeout(_markDone,estMs);
      window.speechSynthesis.speak(u);
    },55);
  };
  return b;
}

// ── STT ───────────────────────────────────────────────────────────────────────
var SR = window.SpeechRecognition || window.webkitSpeechRecognition || null;
var hasMic = !!SR;
var MIC_KEY = 'ruApp_mic_v1';
var isFileUrl = (window.location.protocol === 'file:');

// ── Simple permission helpers (used by perm banners only) ─────────────────────
var micPermState = !hasMic ? 'unavailable' : isFileUrl ? 'fileblock' : 'unknown';
var micPermCallbacks = [];

function updatePermUI(){
  document.querySelectorAll('.perm-status').forEach(function(el){
    el.className='perm-status '+micPermState;
    el.textContent=micPermState==='granted'?'✓ Microphone ready':
      micPermState==='denied'?'✗ Permission denied — enable mic in browser settings':
      micPermState==='requesting'?'⏳ Requesting permission…':
      micPermState==='unavailable'?'✗ Speech API not available':
      '⚪ Tap "Enable Microphone" to allow access';
  });
  document.querySelectorAll('.perm-btn').forEach(function(el){
    if(micPermState==='granted'){el.textContent='✓ Microphone enabled';el.className='perm-btn granted';}
    else if(micPermState==='requesting'){el.textContent='⏳ Requesting…';el.disabled=true;}
    else if(micPermState==='denied'){el.textContent='🔒 Denied — check settings';el.disabled=true;}
    else{el.textContent='🎤 Enable Microphone';el.disabled=false;el.className='perm-btn';}
  });
}

function requestMicPermission(cb){
  if(micPermState==='granted'){if(cb)cb(true);return;}
  if(!hasMic){if(cb)cb(false);return;}
  if(cb)micPermCallbacks.push(cb);
  if(micPermState==='requesting')return;
  micPermState='requesting';updatePermUI();
  navigator.mediaDevices.getUserMedia({audio:true})
    .then(function(stream){
      stream.getTracks().forEach(function(t){t.stop();});
      micPermState='granted';updatePermUI();
      var cbs=micPermCallbacks.slice();micPermCallbacks=[];
      cbs.forEach(function(fn){fn(true);});
    })
    .catch(function(err){
      micPermState=(err.name==='NotAllowedError'||err.name==='PermissionDeniedError')?'denied':'unknown';
      updatePermUI();
      var cbs=micPermCallbacks.slice();micPermCallbacks=[];
      cbs.forEach(function(fn){fn(false);});
    });
}

if(hasMic && navigator.permissions){
  navigator.permissions.query({name:'microphone'}).then(function(result){
    if(result.state==='granted')micPermState='granted';
    else if(result.state==='denied')micPermState='denied';
    updatePermUI();
    result.onchange=function(){
      micPermState=this.state==='granted'?'granted':this.state==='denied'?'denied':'unknown';
      updatePermUI();
    };
  }).catch(function(){});
}

// Build the permission banner (inserted at top of each module)
function permBannerHTML(){
  if(!hasMic) return '<div class="a-banner a-err">🎤 Speech input not available — try Chrome or Edge on Android.<\/div>';
  if(isFileUrl){
    return '<div class="perm-banner" style="border-color:#e87030">'+
      '<div class="perm-banner-title" style="font-size:17px">⚠️ Microphone blocked — file opened locally<\/div>'+
      '<div class="perm-banner-desc" style="color:rgba(255,200,150,.85);margin-bottom:14px">'+
        'Chrome blocks microphone for local files. The fix is a <strong style="color:#fff">lightweight server app<\/strong> '+
        '— it starts in one tap, uses almost no battery, and keeps everything on your phone.'+
      '<\/div>'+

      '<div style="background:rgba(255,255,255,.07);border-radius:4px;padding:14px;margin-bottom:8px">'+
        '<div style="color:var(--gl);font-size:13px;font-weight:600;margin-bottom:2px">📲 Recommended app: Simple HTTP Server<\/div>'+
        '<div style="font-size:11px;color:rgba(255,255,255,.35);margin-bottom:10px">by Phlox-Apps · free · 3 MB · no ads<\/div>'+
        '<div class="step"><span class="step-num">1<\/span><span class="step-txt">Install <strong>Simple HTTP Server<\/strong> from the Play Store<\/span><\/div>'+
        '<div class="step"><span class="step-num">2<\/span><span class="step-txt">Open the app — tap the <strong>folder icon<\/strong> and select your <strong>Downloads<\/strong> folder<\/span><\/div>'+
        '<div class="step"><span class="step-num">3<\/span><span class="step-txt">Tap <strong>Start<\/strong> — the app shows a URL like <code style="background:rgba(0,0,0,.4);padding:1px 6px;border-radius:3px;color:#ffc060">http:\/\/localhost:8080<\/code><\/span><\/div>'+
        '<div class="step"><span class="step-num">4<\/span><span class="step-txt">Open Chrome and go to: <code style="background:rgba(0,0,0,.4);padding:1px 6px;border-radius:3px;color:#ffc060">localhost:8080\/russian-reading-lesson.html<\/code><\/span><\/div>'+
        '<div class="step"><span class="step-num">5<\/span><span class="step-txt">Tap <strong>🎤 Enable Microphone<\/strong> — Chrome asks for permission → tap Allow ✓<\/span><\/div>'+
      '<\/div>'+

      '<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:12px;margin-bottom:8px">'+
        '<div style="color:rgba(255,255,255,.6);font-size:12px;font-weight:600;margin-bottom:6px">💡 Why this uses almost no battery:<\/div>'+
        '<div style="font-size:11px;color:rgba(255,255,255,.35);line-height:1.6">'+
          'The app simply waits for your browser to ask for the file — it does nothing in between. '+
          'CPU usage is 0% when idle. It is a native Android app, not an interpreter like Python. '+
          'You can stop it the moment you close the lesson.'+
        '<\/div>'+
      '<\/div>'+

      '<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:12px">'+
        '<div style="color:rgba(255,255,255,.6);font-size:12px;font-weight:600;margin-bottom:6px">🔒 Privacy:<\/div>'+
        '<div style="font-size:11px;color:rgba(255,255,255,.35);line-height:1.6">'+
          'The server only listens on <code style="background:rgba(0,0,0,.3);padding:1px 4px;border-radius:2px">localhost<\/code> — it is not reachable from the internet or from other devices on your WiFi. '+
          'Your file never leaves your phone. Note: pronunciation scoring uses Chrome\'s built-in speech recognition, which sends audio to Google servers — the same as any website using the SpeechRecognition API.'+
        '<\/div>'+
      '<\/div>'+
    '<\/div>';
  }
  var denied = micPermState==='denied';
  return '<div class="perm-banner" id="pb-'+Math.random().toString(36).slice(2)+'" data-perm>'+
    '<div class="perm-banner-title">🎤 Microphone Access<\/div>'+
    (denied
      ? '<div class="perm-banner-desc" style="color:#ff9070">Microphone access was blocked. Follow the steps below, then tap Enable Microphone again.<\/div>'

// ── SCORING ───────────────────────────────────────────────────────────────────
// Normalise: lowercase, strip punctuation, collapse ё→е (same sound unstressed), trim.
function normRu(s) {
  return s.toLowerCase()
    .replace(/[«»—–.,!?;:\-()]/g, '')
    .replace(/ё/g, 'е')
    .replace(/\s+/g, ' ')
    .trim();
}

// Levenshtein distance.
function lev(a, b) {
  if (a === b) return 0;
  var m = a.length, n = b.length;
  if (!m) return n; if (!n) return m;
  var p = [], c = [];
  for (var j = 0; j <= n; j++) p[j] = j;
  for (var i = 1; i <= m; i++) {
    c[0] = i;
    for (var jj = 1; jj <= n; jj++)
      c[jj] = a[i-1] === b[jj-1] ? p[jj-1] : 1 + Math.min(p[jj-1], p[jj], c[jj-1]);
    p = c.slice();
  }
  return p[n];
}

// Score 0–100: text similarity × confidence multiplier.
//
// Chrome's confidence is unreliable — it varies widely (0.3–0.9) even for correct
// speech depending on mic quality, accent, and background noise. It should act only
// as a LIGHT penalty for genuinely unclear input, not a steep linear cut.
//
// Formula: textSim × (0.88 + 0.12 × conf)
//   conf 1.0 → ×1.00  — perfect signal
//   conf 0.6 → ×0.95  — slight accent/noise, barely penalised
//   conf 0.4 → ×0.93  — Chrome guessing, small penalty only
//   conf 0.2 → ×0.90  — very unclear, ~10% off max
//
// For syllables the formula is identical — the syllable leniency (textSim boost for
// 1-char phoneme swap) already does the right job there without needing a different
// multiplier curve.
function scoreTranscript(heard, confidence, target, opts) {
  var h = normRu(heard), t = normRu(target);
  if (!h) return 0;

  // ── Text similarity ────────────────────────────────────────────────────────
  var textSim;
  if (h === t) {
    textSim = 1;
  } else {
    var tW = t.split(' '), hW = h.split(' ');
    var total = 0;
    for (var i = 0; i < tW.length; i++) {
      var tw = tW[i], best = 0;
      for (var j = 0; j < hW.length; j++) {
        var hw = hW[j];
        var dist = lev(hw, tw);
        var maxLen = Math.max(hw.length, tw.length, 1);
        var sim = 1 - dist / maxLen;
        // Syllable leniency: a single-phoneme STT error on a ≤3-char syllable
        // (Chrome maps "ОМ" → "он", "МА" → "мне", etc.) still earns 0.88 textSim.
        if (opts && opts.syllable && tw.length <= 3 && dist === 1) sim = 0.88;
        if (sim > best) best = sim;
      }
      total += best;
    }
    textSim = total / tW.length;
  }

  // ── Confidence multiplier (shallow — only penalises genuinely unclear input) ─
  var conf = (typeof confidence === 'number') ? Math.min(1, Math.max(0, confidence)) : 0.75;
  var confMult = 0.88 + 0.12 * conf;

  return Math.round(textSim * confMult * 100);
}

// ── MIC WIDGET ────────────────────────────────────────────────────────────────
function micWidget(target, cb, opts) {
  opts = opts || {};
  var wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:6px;width:100%';

  if (!hasMic) {
    wrap.innerHTML = '<div class="mic-result miss">🎤 Speech recognition unavailable — use Chrome on Android.</div>';
    return wrap;
  }

  var btn = document.createElement('button');
  btn.className = 'mic-btn';
  btn.style.cssText = 'width:100%;font-size:15px;padding:12px';
  btn.textContent = '🎤 Speak';

  var info = document.createElement('div');

  function resetBtn() {
    btn.disabled = false;
    btn.style.cssText = 'width:100%;font-size:15px;padding:12px';
    btn.textContent = '🎤 Speak again';
  }

  function renderScore(transcript, confidence, isInterim) {
    var pct  = scoreTranscript(transcript, confidence, target, opts);
    var cls  = pct >= 80 ? 'great' : pct >= 50 ? 'close' : 'miss';
    var icon = pct >= 80 ? '✓'    : pct >= 50 ? '≈'     : '✗';
    var msg  = pct >= 80 ? 'Great pronunciation!' : pct >= 50 ? 'Getting there!' : 'Try again — listen first.';
    var note = isInterim ? '<div style="font-size:10px;opacity:.6;margin-top:2px">⚠ Partial — speak a little longer next time</div>' : '';
    // Display the normalised transcript — same text the score was computed on,
    // so the "Heard" line always matches what was evaluated (no stray punctuation
    // or capitalisation artefacts from Chrome's raw output).
    var display = normRu(transcript);
    btn.disabled = false;
    btn.style.cssText = 'width:100%;font-size:15px;padding:12px';
    btn.textContent = '🎤 Speak again';
    info.innerHTML = '<div class="mic-result ' + cls + '"><span class="mic-score">' + icon + ' ' + pct + '%</span>' + msg +
      '<div class="mic-heard">Heard: "' + display + '"</div>' + note + '</div>';
    try { localStorage.setItem(MIC_KEY, '1'); } catch(e) {}
    if (cb) cb(pct, transcript);
  }

  // ── Recording state ────────────────────────────────────────────────────────
  var _rec = null;          // current SR instance
  var _manuallyStopped = false;
  var _silenceTimer = null;

  // Multi-word targets need continuous=true so Chrome doesn't stop after the first word.
  var _isMultiWord = target.trim().indexOf(' ') !== -1;
  // Short single syllables/letters benefit from one auto-retry if Chrome misses them.
  var _isShort = !_isMultiWord && normRu(target).replace(/\s/g,'').length <= 4;

  function clearSilenceTimer() {
    if (_silenceTimer) { clearTimeout(_silenceTimer); _silenceTimer = null; }
  }
  function armSilenceTimer() {
    clearSilenceTimer();
    _silenceTimer = setTimeout(function() {
      _silenceTimer = null;
      var r = _rec; if (!r) return;
      _rec = null; _manuallyStopped = true;
      btn.disabled = true;
      try { r.stop(); } catch(e) {}
    }, 4000);
  }

  function startSession(retryCount) {
    var r = new SR();
    _rec = r;
    r.lang = 'ru-RU';
    r.continuous    = _isMultiWord;
    r.interimResults = true;
    r.maxAlternatives = 5;

    var _finalScored = false, _lastInterim = '', _lastInterimConf = 0.5;
    // Accumulator for continuous (multi-word) mode: store {t, c} per chunk
    var _contParts = [];
    // Retry counter — short/syllable targets get up to 3 attempts before giving up
    var _retryCount = retryCount || 0;
    var _maxRetries = (_isShort || (opts && opts.syllable)) ? 3 : 1;

    r.onstart = function() {
      armSilenceTimer();
      btn.disabled = false;
      btn.style.cssText = 'width:100%;font-size:15px;padding:12px;background:#cc1100;border-color:#cc1100;color:#fff';
      btn.textContent = '■ Stop';
      info.innerHTML = '<div style="font-size:12px;color:var(--muted);font-style:italic;padding:4px 2px">Speak now — tap ■ Stop or wait for auto-score.</div>';
    };

    r.onresult = function(ev) {
      armSilenceTimer();
      var finalT = '', finalC = 0, finalN = 0, interim = '';
      for (var i = ev.resultIndex; i < ev.results.length; i++) {
        if (ev.results[i].isFinal) {
          // Pick the alternative whose combined score (text × confidence) is highest.
          // This prevents gaming: an alternative that text-matches perfectly but with
          // low confidence (Chrome was guessing) won't outscore a confident near-match.
          var bestT = ev.results[i][0].transcript;
          var bestC = ev.results[i][0].confidence || 0.5;
          var bestScore = scoreTranscript(bestT, bestC, target, opts);
          for (var j = 1; j < ev.results[i].length; j++) {
            var altT = ev.results[i][j].transcript;
            var altC = ev.results[i][j].confidence || 0.5;
            var altScore = scoreTranscript(altT, altC, target, opts);
            if (altScore > bestScore) { bestScore = altScore; bestT = altT; bestC = altC; }
          }
          finalT += (finalT ? ' ' : '') + bestT;
          finalC += bestC; finalN++;
        } else {
          interim += ev.results[i][0].transcript;
          // Chrome doesn't give confidence for interim results; use a conservative default
          _lastInterimConf = 0.55;
        }
      }
      if (interim) _lastInterim = interim;
      if (finalT) {
        var avgC = finalN ? finalC / finalN : 0.5;
        if (_isMultiWord) {
          _contParts.push({ t: finalT, c: avgC });
          info.innerHTML = '<div style="font-size:13px;color:var(--muted);padding:4px 2px;font-style:italic">🎙 "' + _contParts.map(function(x){return x.t;}).join(' ') + '"</div>';
        } else {
          clearSilenceTimer();
          if (_rec === r) _rec = null;
          _finalScored = true;
          renderScore(finalT, avgC, false);
        }
      }
    };

    r.onerror = function(ev) {
      if (ev.error === 'aborted' || ev.error === 'no-speech') return;
      clearSilenceTimer();
      if (_rec === r) _rec = null;
      _finalScored = true;
      if (ev.error === 'not-allowed' || ev.error === 'permission-denied') {
        micPermState = 'denied'; updatePermUI();
        resetBtn(); info.innerHTML = '<div class="mic-result miss">🔒 Mic blocked — enable in Chrome site settings.</div>';
      } else {
        resetBtn(); info.innerHTML = '<div class="mic-result miss">⚠ Error: ' + ev.error + '</div>';
      }
    };

    r.onend = function() {
      clearSilenceTimer();
      if (_rec === r) _rec = null;
      if (_finalScored) return;

      if (_isMultiWord) {
        if (_contParts.length) {
          var joinedT = _contParts.map(function(x){return x.t;}).join(' ');
          var avgConf = _contParts.reduce(function(s,x){return s+x.c;},0) / _contParts.length;
          renderScore(joinedT, avgConf, false);
        } else if (_lastInterim) {
          renderScore(_lastInterim, _lastInterimConf, true);
        } else {
          resetBtn(); info.innerHTML = '<div class="mic-result miss">⚠ Nothing heard — speak clearly and wait.</div>';
        }
        return;
      }

      // Short/syllable target: retry up to _maxRetries times (suppressed on manual stop)
      if (_isShort && _retryCount < _maxRetries && !_manuallyStopped) {
        startSession(_retryCount + 1);
        return;
      }

      if (_lastInterim) renderScore(_lastInterim, _lastInterimConf, true);
      else { resetBtn(); info.innerHTML = '<div class="mic-result miss">⚠ Nothing heard — speak a little louder.</div>'; }
    };

    try { r.start(); }
    catch(ex) {
      if (_rec === r) _rec = null;
      resetBtn(); info.innerHTML = '<div class="mic-result miss">⚠ Could not start: ' + ex.message + '</div>';
    }
  }

  // ── Button click ──────────────────────────────────────────────────────────
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (btn.disabled) return;
    if (isFileUrl) { info.innerHTML = '<div class="mic-result miss">⚠️ Open via localhost, not file://.</div>'; return; }
    if (micPermState === 'denied') { info.innerHTML = '<div class="mic-result miss">🔒 Mic blocked — enable in Chrome site settings.</div>'; return; }

    btn.disabled = true;

    // If recording is active — stop it
    if (_rec) {
      var r = _rec; _rec = null;
      _manuallyStopped = true;
      clearSilenceTimer();
      try { r.stop(); } catch(e) {}
      return;
    }

    _manuallyStopped = false;
    info.innerHTML = '<div style="font-size:12px;color:var(--muted);font-style:italic;padding:4px 2px">🎙 Starting mic…</div>';

    function go() { startSession(0); }

    if (micPermState === 'granted') {
      go();
    } else {
      btn.textContent = '⏳ Getting permission…';
      requestMicPermission(function(ok) {
        if (ok) { go(); }
        else { resetBtn(); btn.textContent = '🎤 Speak'; info.innerHTML = '<div class="mic-result miss">🔒 Permission denied.</div>'; }
      });
    }
  });

  wrap.appendChild(btn);
  wrap.appendChild(info);
  return wrap;
}

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

// Shuffle pool[fromIdx..end] in place — randomises remaining exercises after each step
function shuffleRemaining(pool,fromIdx){
  for(var i=pool.length-1;i>fromIdx;i--){
    var j=fromIdx+Math.floor(Math.random()*(i-fromIdx+1));
    var t=pool[i];pool[i]=pool[j];pool[j]=t;
  }
}

  {c:'Красота спасёт мир.',r:'KRA-SA-TÁ SPA-SYÓT MÍR.',e:'Beauty will save the world.',src:'Достоевский — Идиот'},
  {c:'Человек есть тайна. Её надо разгадать.',r:'CHE-LA-VYÉK YEST TÁY-NA. YEY NÁ-DA RAZ-GA-DÁT.',e:'Man is a mystery. It needs to be solved.',src:'Достоевский'},
  {c:'Надо любить жизнь больше, чем смысл её.',r:'NÁ-DA LYU-BÍT ZHÝZN BÓL-SHE CHEM SMÝSL YE-YÓ.',e:'One must love life more than the meaning of it.',src:'Достоевский — Братья Карамазовы'},
  {c:'Страдание и боль всегда обязательны для широкого сознания и глубокого сердца.',r:'STRA-DÁ-NI-YE I BÓL FSYIG-DÁ A-BYA-ZÁ-TYIL-NY DLA SHI-RÓ-KA-VA SAZ-NÁ-NI-YA I GLU-BÓ-KA-VA SYÉR-TSA.',e:'Suffering and pain are always obligatory for a broad consciousness and a deep heart.',src:'Достоевский — Преступление и наказание'},
  {c:'В страдании есть идея — это знал уже Достоевский.',r:'V STRA-DÁ-NI-I YEST I-DYÉ-YA — É-TA ZNAL U-ZHÉ DAS-TA-YÉEV-SKI.',e:'There is an idea in suffering — Dostoevsky already knew this.',src:'Достоевский'},
  {c:'Полюбите нас чёрненькими, а беленькими нас всякий полюбит.',r:'PA-LYU-BÍ-TYE NAS CHYÓR-NYEN-KI-MI A BYÉL-YEN-KI-MI NAS VSYÁ-KI PA-LYU-BIT.',e:'Love us when we are dark and miserable — anyone will love us when we are bright and happy.',src:'Достоевский'},
  // Чехов
  {c:'В человеке должно быть всё прекрасно: и лицо, и одежда, и душа, и мысли.',r:'V CHE-LA-VYÉK-YE DAZH-NÓ BÝT VSYO PREK-RÁS-NA: I LI-TSÓ I A-DYÉZH-DA I DU-SHÁ I MÝS-LI.',e:'Everything in a person should be beautiful: face, clothes, soul and thoughts.',src:'Чехов — Дядя Ваня'},
  {c:'Если боишься одиночества, не женись.',r:'YÉS-LI BA-ÍSH-SYA A-DI-NÓ-CHEST-VA NYÉ ZHY-NÍS.',e:'If you fear loneliness, don\'t get married.',src:'Чехов'},
  {c:'Краткость — сестра таланта.',r:'KRÁT-KAST SIS-TRÁ TA-LÁN-TA.',e:'Brevity is the sister of talent.',src:'Чехов'},
  {c:'Университет развивает все способности, в том числе — глупость.',r:'U-NI-VYER-SI-TYÉT RAZ-VÍ-VA-YIT VSYE SPA-SÓB-NAS-TI, V TOM CHÍS-LYE — GLÚ-PAST.',e:'A university develops all abilities, including stupidity.',src:'Чехов'},
  {c:'Когда человеку хорошо, ему некогда думать, что ему плохо.',r:'KOG-DÁ CHE-LA-VYÉK-U KHA-RA-SHÓ, YI-MÚ NYÉK-OG-DA DÚ-MAT SHTO YI-MÚ PLÓ-KHA.',e:'When a person is feeling good, he has no time to think that he is feeling bad.',src:'Чехов'},
  // Булгаков — Мастер и Маргарита
  {c:'Рукописи не горят.',r:'RU-KA-PÍ-SI NYÉ GA-RYÁT.',e:'Manuscripts don\'t burn.',src:'Булгаков — Мастер и Маргарита'},
  {c:'Трусость — самый страшный порок.',r:'TRÚ-SAST — SÁ-MY STRÁSH-NY PA-RÓK.',e:'Cowardice is the most terrible vice.',src:'Булгаков — Мастер и Маргарита'},
  {c:'Никогда и ничего не просите! Никогда и ничего — и в особенности у тех, кто сильнее вас.',r:'NYI-KAG-DÁ I NYI-CHI-VÓ NYÉ PRA-SÍ-TYE! NYI-KAG-DÁ I NYI-CHI-VÓ — I V A-SÓ-BEN-NAS-TI U TYEKH KTO SIL-NYÉE VAS.',e:'Never ask for anything! Never and nothing — especially from those who are stronger than you.',src:'Булгаков — Мастер и Маргарита'},
  {c:'Он был жестоко наказан за свою трусость.',r:'ON BYL ZHES-TÓ-KA NA-KÁ-ZAN ZA SVO-YÚ TRÚ-SAST.',e:'He was cruelly punished for his cowardice.',src:'Булгаков — Мастер и Маргарита'},
  // Лермонтов
  {c:'Нет, я не Байрон, я другой, ещё неведомый избранник.',r:'NYÉT YA NYÉ BÁY-RON YA DRU-GÓY, YI-SHCHÓ NYI-VYÉD-A-MY IZ-BRÁN-NIK.',e:'No, I am not Byron — I am another, still unknown chosen one.',src:'Лермонтов'},
  {c:'Я жить хочу! Хочу печали, любви и счастью вопреки.',r:'YA ZHÝT KHA-CHÚ! KHA-CHÚ PYI-CHA-LI, LYU-BVÍ I SCHÁST-YU VAP-RYI-KÍ.',e:'I want to live! I want sorrow, contrary to love and happiness.',src:'Лермонтов'},
  {c:'Печально я гляжу на наше поколенье!',r:'PYI-CHÁЛ-NA YA GLYÁ-ZHU NA NÁ-SHE PA-KA-LYÉN-YE!',e:'Sadly I look upon our generation!',src:'Лермонтов'},
  // Тургенев
  {c:'Россия без каждого из нас обойтись может, но никто из нас без неё не может обойтись.',r:'RAS-SÍ-YA BYES KÁZ-DA-VA IZ NAS AB-AY-TÍS MÓ-ZHET NO NYI-KTO IZ NAS BYES NYE-YÓ NYÉ MÓ-ZHET AB-AY-TÍS.',e:'Russia can get along without each of us, but none of us can get along without Russia.',src:'Тургенев'},
  {c:'Хочешь быть счастливым? Выучись сначала терпеть несчастье.',r:'KHÓ-CHESH BÝT SCHAST-LÍ-VYM? VÝ-U-CHIS SNA-CHA-LA TYIR-PYÉT NYE-SCHÁST-YE.',e:'Do you want to be happy? First learn to endure unhappiness.',src:'Тургенев'},
  // Гоголь
  {c:'Русь! Русь! Вижу тебя, из моего чудного, прекрасного далека тебя вижу.',r:'RUS! RUS! VÍ-ZHU TYI-BYÁA IZ MA-YI-VÓ CHUD-NÓ-VA PREK-RÁS-NA-VA DA-LYI-KÁ TYI-BYÁA VÍ-ZHU.',e:'Rus! Rus! I see you, from my wondrous, beautiful distance I see you.',src:'Гоголь — Мёртвые души'},
  {c:'Скучно на этом свете, господа!',r:'SKÚCH-NA NA É-TAM SVYE-TYE, GAS-PA-DÁ!',e:'It is dull in this world, ladies and gentlemen!',src:'Гоголь'},
  {c:'Знаете ли вы украинскую ночь? О, вы не знаете украинской ночи!',r:'ZNÁ-YI-TYE LI VY UK-RA-ÍN-SKU-YU NÓCH? O, VY NYÉ ZNÁ-YI-TYE UK-RA-ÍN-SKAY NÓ-CHI!',e:'Do you know a Ukrainian night? Oh, you do not know a Ukrainian night!',src:'Гоголь'},
  // Набоков
  {c:'Лолита, свет моей жизни, огонь моих чресел.',r:'LA-LÍ-TA, SVYET MA-YÉY ZHÝZ-NI, A-GÓN MA-ÍKH CHRYÉ-SYI-LI.',e:'Lolita, light of my life, fire of my loins.',src:'Набоков — Лолита'},
  {c:'Память — это единственная кладовая, из которой никто не может нас обокрасть.',r:'PÁ-MYAT — É-TA YI-DÍN-STVIN-NA-YA KLA-DA-VÁ-YA IZ KA-TÓ-RAY NYI-KTO NYÉ MÓ-ZHIT NAS A-BA-KRÁSD.',e:'Memory is the only storehouse from which no one can rob us.',src:'Набоков'},
  // Пастернак
  {c:'Февраль. Достать чернил и плакать!',r:'FYIV-RÁLY. DAS-TÁT CHIR-NÍL I PLÁ-KAT!',e:'February. To get ink and weep!',src:'Пастернак'},
  {c:'Во всём мне хочется дойти до самой сути.',r:'VA FSYÓM MNYE KHÓ-CHIT-SYA DAY-TÍ DA SÁ-MAY SÚ-TI.',e:'In everything I want to reach the very essence.',src:'Пастернак'},
  // Ахматова
  {c:'Я научила женщин говорить, но как их замолчать заставить?',r:'YA NA-U-CHÍ-LA ZHÉN-SHCHIN GA-VA-RÍT, NO KAK IKH ZA-MAL-CHÁТ ZAS-TÁ-VIT?',e:'I taught women to speak, but how to make them fall silent?',src:'Ахматова'},
  {c:'Мне голос был. Он звал утешно.',r:'MNYE GÓ-LAS BYL. ON ZVAL U-TYÉSH-NA.',e:'A voice came to me. It called consolingly.',src:'Ахматова'},
  // Блок
  {c:'Ночь, улица, фонарь, аптека, бессмысленный и тусклый свет.',r:'NÓCH, Ú-LI-TSA, FA-NÁR, AP-TYÉ-KA, BYIS-MÝSL-YIN-NY I TÚS-KLY SVYET.',e:'Night, street, lamp, pharmacy — a senseless and dim light.',src:'Блок'},
  {c:'О, весна без конца и без краю — без конца и без краю мечта!',r:'O VYES-NÁ BYES KON-TSÁ I BYES KRÁ-YU — BYES KON-TSÁ I BYES KRÁ-YU MYECH-TÁ!',e:'Oh, spring without end and without limit — without end and without limit the dream!',src:'Блок'},
  // Маяковский
  {c:'Послушайте! Ведь, если звёзды зажигают — значит — это кому-нибудь нужно?',r:'PAS-LÚ-SHAY-TYE! VYED YÉSLI ZVYOZ-DY ZA-ZHI-GÁ-YUT — ZNÁCH-IT — É-TA KA-MÚ-NYI-BUD NÚZH-NA?',e:'Listen! If the stars are lit — it means — someone needs them?',src:'Маяковский'},
  {c:'Я хочу, чтоб к штыку приравняли перо.',r:'YA KHA-CHÚ, SHTOB K SHTÝ-KU PRI-RAV-NYÁ-LI PYI-RÓ.',e:'I want the pen to be equated with the bayonet.',src:'Маяковский'},
  // Есенин
  {c:'Не жалею, не зову, не плачу, всё пройдёт, как с белых яблонь дым.',r:'NYÉ ZHA-LYÉY-U, NYÉ ZA-VÚ, NYÉ PLÁ-CHU, VSYO PRAY-DYÓT KAK S BYÉLYKH ÁB-LAN DÝM.',e:'I do not regret, do not call, do not weep — all will pass like smoke from white apple trees.',src:'Есенин'},
  {c:'Дай, Джим, на счастье лапу мне.',r:'DAY, DZHIM, NA SCHÁST-YE LÁ-PU MNYE.',e:'Give me your paw for luck, Jim.',src:'Есенин'},
  {c:'Природа не храм, а мастерская, и человек в ней работник.',r:'PRI-RÓ-DA NYÉT KHRAM A MAS-TYR-SKÁ-YA, I CHE-LA-VYÉK V NYEY RA-BÓT-NIK.',e:'Nature is not a temple, but a workshop, and man is a worker in it.',src:'Тургенев — Отцы и дети'},
  {c:'Во дни сомнений, во дни тягостных раздумий о судьбах моей родины — ты один мне поддержка и опора.',r:'VA DNI SAM-NYÉN-I, VA DNI TYÁH-GAST-NYKH RAZ-DÚ-MI A SUD-BÁK HA-YEY RA-DÍ-NY — TY A-DÍN MNYE PÁD-DYERZH-KA I A-PÓ-RA.',e:'In days of doubt, in days of painful brooding — you alone are my support and stay.',src:'Тургенев — Русский язык'},
  {c:'Берегите наш язык, наш прекрасный русский язык.',r:'BYE-RYE-GÍ-TYE NASH YA-ZÝK, NASH PREK-RÁS-NY RÚS-SKI YA-ZÝK.',e:'Cherish our language, our beautiful Russian language.',src:'Тургенев'},
  {c:'Хочешь быть счастливым? Выучись сначала терпеть несчастье.',r:'KHÓ-CHESH BÝT SCHAST-LÍ-VYM? VÝ-U-CHIS SNA-CHA-LA TYIR-PYÉT NYE-SCHÁST-YE.',e:'Do you want to be happy? First learn to endure unhappiness.',src:'Тургенев'},
  {c:'Чуден Днепр при тихой погоде.',r:'CHÚD-EN DNYEPR PRI TÍ-KHAY PA-GÓ-DYE.',e:'Wondrous is the Dnieper in quiet weather.',src:'Гоголь — Тарас Бульба'},
  {c:'Нет уз святее товарищества.',r:'NYÉT UZ SVA-TYÉY-YE TA-VÁ-RISH-CHES-TVA.',e:'There are no bonds more sacred than comradeship.',src:'Гоголь — Тарас Бульба'},
  {c:'Скучно на этом свете, господа!',r:'SKÚCH-NA NA É-TAM SVYE-TYE, GAS-PA-DÁ!',e:'It is dull in this world, ladies and gentlemen!',src:'Гоголь'},
  {c:'Знаете ли вы украинскую ночь? О, вы не знаете украинской ночи!',r:'ZNÁ-YI-TYE LI VY UK-RA-ÍN-SKU-YU NÓCH? O, VY NYÉ ZNÁ-YI-TYE UK-RA-ÍN-SKAY NÓ-CHI!',e:'Do you know a Ukrainian night? Oh, you do not know a Ukrainian night!',src:'Гоголь'},
  {c:'Быть знаменитым некрасиво.',r:'BYT ZNA-MYE-NÍ-TYM NYE-KRA-SÍ-VA.',e:'To be famous is not seemly.',src:'Пастернак'},
  {c:'Цель творчества — самоотдача, а не шумиха, не успех.',r:'TSYEL TVÓR-CHES-TVA — SA-MA-AT-DÁ-CHA, A NYÉ SHU-MÍ-KHA, NYÉ US-PYÉKH.',e:'The goal of creativity is self-giving, not noise, not success.',src:'Пастернак'},
  {c:'Жить — это не поле перейти.',r:'ZHIT — É-TA NYÉ PÓ-LYE PYE-RYE-TÍ.',e:'To live is not like crossing a field.',src:'Пастернак — Доктор Живаго'},
  {c:'Я была тогда с моим народом там, где мой народ, к несчастью, был.',r:'YA BY-LÁ TAG-DÁ S MA-ÍM NA-RÓ-DAM TAM GDYE MOY NA-RÓT K NYE-SCHÁST-YU BYL.',e:'I was then with my people there, where my people, to their misfortune, were.',src:'Ахматова — Реквием'},
  {c:'Светить всегда, светить везде, до дней последних донца.',r:'SVYE-TÍT FSYEG-DÁ, SVYE-TÍT VYEZ-DYÉ, DA DNYÉY PAS-LYÉD-NIKH DÁN-TSA.',e:'To shine always, to shine everywhere, to the very last days.',src:'Маяковский'},
  {c:'Я последний поэт деревни.',r:'YA PAS-LYÉD-NY PA-ÉT DYE-RYÉV-NYI.',e:'I am the last poet of the village.',src:'Есенин'},
  {c:'Отговорила роща золотая берёзовым весёлым языком.',r:'AT-GA-VA-RÍ-LA RÓ-SHCHA ZA-LA-TÁ-YA BYE-RYÓZ-A-VYM VYE-SYÓ-LYM YA-ZY-KÓM.',e:'The golden grove has spoken its last in the merry tongue of birch trees.',src:'Есенин'},
  {c:'Жизнь коротка, искусство долговечно.',r:'ZHYZN KA-RÓT-KA, IS-KÚS-TVA DAL-GA-VYÉCH-NA.',e:'Life is short, art is long.',src:'Набоков'},
  {c:'Мир движется вперёд благодаря тем, кто страдает.',r:'MIR DVÍ-ZHE-TSA VPYE-RYÓD BLA-GA-DA-RYÁ TYEM KTO STRA-DÁ-YET.',e:'The world advances thanks to those who suffer.',src:'Толстой'},
  {c:'Если в жизни нет смысла, надо его создать.',r:'YES-LI V ZHYZ-NYI NYÉT SMÝS-LA NÁ-DA YE-VÓ SAZ-DÁT.',e:'If life has no meaning, one must create it.',src:'Толстой'},
  {c:'Все великие истины начинались как богохульства.',r:'VSYE VYE-LÍ-KI-YE IS-TÍ-NY NA-CHI-NÁ-LIS KAK BA-GA-KHÚL-STVA.',e:'All great truths begin as blasphemies.',src:'Толстой'},
  {c:'Самое трудное — это начать.',r:'SA-MA-YE TRÚD-NA-YE — É-TA NA-CHÁT.',e:'The hardest thing is to begin.',src:'Чехов'},
  {c:'Медицина — моя законная жена, а литература — любовница.',r:'MYE-DI-TSÍ-NA — MA-YÁ ZA-KÓN-NA-YA ZHI-NÁ, A LI-TYE-RA-TÚ-RA — LYU-BÓV-NI-TSA.',e:'Medicine is my lawful wife and literature is my mistress.',src:'Чехов'},
  {c:'Университет развивает все способности, в том числе — глупость.',r:'U-NI-VYER-SI-TYÉT RAZ-VÍ-VA-YIT VSYE SPA-SÓB-NAS-TI, V TOM CHÍS-LYE — GLÚ-PAST.',e:'A university develops all abilities, including stupidity.',src:'Чехов'},
  {c:'Если Бога нет, всё позволено.',r:'YES-LI BÓ-GA NYÉT VSYO PAZ-VÓ-LYE-NA.',e:'If God does not exist, everything is permitted.',src:'Достоевский — Братья Карамазовы'},
  {c:'Любите жизнь раньше всего.',r:'LYU-BÍ-TYE ZHYZN RÁN-SHE VSYE-VÓ.',e:'Love life above everything.',src:'Достоевский'},
  {c:'Смирись, гордый человек, и прежде всего сломи свою гордость.',r:'SMIR-ÍS GAR-DÝ CHE-LA-VYÉK I PRYE-ZHDE VSYE-VÓ SLA-MÍ SVO-YÚ GOR-DAST.',e:'Humble yourself, proud man, and above all break your pride.',src:'Достоевский'},
  {c:'Люди как люди. Любят деньги, но ведь это всегда было.',r:'LYÚ-DI KAK LYÚ-DI. LYÚ-BYAT DYÉN-GI NO VYED É-TA FSYEG-DÁ BY-LO.',e:'People are like people. They love money, but then that was always the case.',src:'Булгаков — Мастер и Маргарита'},
  {c:'Злых людей нет на свете, есть только люди несчастливые.',r:'ZLYKH LYÚ-DYY NYÉT NA SVYE-TYE YES-T TOL-KA LYÚ-DI NYE-SCHAST-LÍ-VY-YE.',e:'There are no evil people in the world, only unhappy ones.',src:'Булгаков'},
  {c:'Чем меньше женщину мы любим, тем легче нравимся мы ей.',r:'CHEM MYÉN-SHE ZHÉN-SHCHI-NU MY LYU-BÍM TYEM LYÓKH-CHE NRÁ-VIM-SYA MY YEY.',e:'The less we love a woman, the easier it is for her to like us.',src:'Пушкин — Евгений Онегин'},
  {c:'Мы все учились понемногу чему-нибудь и как-нибудь.',r:'MY VSYE U-CHÍL-IS PA-NYEM-NÓ-GU CHE-MÚ-NYI-BUD I KAK-NYI-BUD.',e:'We all learned a little of something and somehow.',src:'Пушкин — Евгений Онегин'},
  {c:'И скучно, и грустно, и некому руку подать в минуту душевной невзгоды.',r:'I SKÚ-CHNA I GRÚS-NA I NYÉ-KA-MU RÚ-KU PO-DAT V MI-NÚ-TU DU-SHÉV-NAY NYEV-ZGÓ-DY.',e:'How dull and sad, and there is no one to lend a hand in a moment of adversity.',src:'Лермонтов'},
  {c:'Что без страданий жизнь поэта? И что без бури океан?',r:'SHTO BYES STRA-DÁ-NIY ZHYZN PA-É-TA? I SHTO BYES BÚ-RI A-KYE-ÁN?',e:'What is a poet life without suffering? And what is the ocean without a storm?',src:'Лермонтов'},
  {c:'Революция — это музыка, которую надо уметь слышать.',r:'RYE-VA-LYÚ-TSI-YA — É-TA MÚ-ZY-KA KA-TÓ-RU-YU NA-DA U-MYÉT SLÝSH-AT.',e:'Revolution is music that one must know how to hear.',src:'Блок'},
  {c:'Не стыдно чего-то не знать, стыдно не хотеть знать.',r:'NYÉ STÝD-NA CHE-VÓ-TA NYÉ ZNAT STÝD-NA NYÉ KHA-TYÉT ZNAT.',e:'It is not shameful not to know; it is shameful not to want to know.',src:'Русская мудрость'},
  {c:'Слова — это тени мыслей.',r:'SLO-VÁ — É-TA TYÉN-I MÝS-LYEY.',e:'Words are shadows of thoughts.',src:'Русская мудрость'},
  {c:'Счастье — это побочный продукт правильного образа жизни.',r:'SCHÁS-TYE — É-TA PA-BÓ-CHNY PRA-DUKT PRÁ-VIL-NA-VA AB-RA-ZA ZHYZ-NYI.',e:'Happiness is a by-product of the right way of living.',src:'Мудрость'},
  {c:'Парламент принял закон о защите персональных данных граждан.',r:'PAR-LÁ-MYENT PRI-NYÁL ZA-KÓN A ZA-SHCHÍ-TYE PYER-SA-NÁL-NYKH DÁN-NYKH GRAZH-DÁN.',e:'Parliament passed a law on the protection of citizens personal data.',src:'Новости'},
  {c:'Центральный банк повысил ключевую ставку на полпроцента.',r:'TSEN-TRÁL-NY BANK PA-VÝ-SIL KLYÚ-CHE-VU-YU STÁF-KU NA POL-PRO-TSÉEN-TA.',e:'The central bank raised the key interest rate by half a percent.',src:'Финансы'},
  {c:'Учёные обнаружили новый экзопланетный кандидат в обитаемой зоне.',r:'U-CHÓ-NY-YE AB-NA-RÚ-ZHI-LI NÓ-VY EK-ZA-PLA-NYÉT-NY KAN-DI-DÁT V A-BI-TÁ-YE-MAY ZÓ-NYE.',e:'Scientists discovered a new exoplanet candidate in the habitable zone.',src:'Наука'},
  {c:'Переговоры о прекращении огня завершились без результата.',r:'PYE-RYE-GA-VÓ-RY A PRYE-KRA-SHCHYÉ-NI-I AG-NYÁA ZA-VYÉR-SHI-LIS BYES RYE-ZUL-TÁ-TA.',e:'Ceasefire negotiations ended without result.',src:'Новости'},
  {c:'Министерство иностранных дел выразило озабоченность ситуацией.',r:'MI-NIS-TYÉR-STVA I-NA-STRÁN-NYKH DYED VÝ-RA-ZI-LA A-ZA-BÓ-CHEN-NAST SI-TU-Á-TSI-YEY.',e:'The Ministry of Foreign Affairs expressed concern over the situation.',src:'Новости'},

// Build items for Ultra mode — only hard content
function buildUltraItems(){
  var words = shuffle(WL3.slice()).slice(0,25).map(function(w){return{c:w.w,r:w.r,e:w.e,t:'word',time:10};});
  var phrases = shuffle(PL3.slice()).slice(0,25).map(function(p){return{c:p.c,r:p.r,e:p.e,t:'phrase',time:15};});
  var sentences = shuffle(HARD_SENTENCES).slice(0,50).map(function(s){return{c:s.c,r:s.r,e:s.e,t:'sentence',src:s.src,time:22};});
  // Interleave: word → phrase → sentence, cycling until all pools exhausted
  var all=[];
  var pools=[words,phrases,sentences];
  var ptrs=[0,0,0];
  // Pattern: W P S S — repeat until all pools drained
  var pattern=[0,1,2,2];
  var pi=0;
  while(ptrs[0]<pools[0].length||ptrs[1]<pools[1].length||ptrs[2]<pools[2].length){
    var idx=pattern[pi%pattern.length];pi++;
    if(ptrs[idx]<pools[idx].length){all.push(pools[idx][ptrs[idx]++]);}
    else{
      // Skip exhausted pool, try next in pattern
      var found=false;
      for(var k=0;k<3;k++){if(ptrs[k]<pools[k].length){all.push(pools[k][ptrs[k]++]);found=true;break;}}
      if(!found)break;
    }
  }
  return all;
}

var curTab=null;
function showTab(id){
  if(curTab===id)return;
  TABS.forEach(function(t){
    document.getElementById('nb-'+t.id).classList.toggle('active',t.id===id);
    document.getElementById('m-'+t.id).classList.toggle('active',t.id===id);

function buildLetters(){
  var mod=document.getElementById('m-letters');
  var lv=1,sel=null,done={};
  function pool(){return LETTERS.filter(function(l){return l.lv<=lv;});}
  function render(){
    mod.innerHTML='<h2 class="stitle">🔤 Letter Pronunciation<\/h2><p class="sdesc">Tap a letter — listen — then speak it. Score 80%+ to mark it mastered.<\/p>';
    mod.appendChild(levelBar(lv,function(v){lv=v;sel=null;render();}));
    insertBanner(mod);
    var p=pool();
    var g=document.createElement('div');g.className='lgrid';g.id='lg';
    p.forEach(function(l,i){
      var c=document.createElement('div');
      c.className='lcard'+(sel===i?' sel':'')+(done[l.cyr]?' done':'');
      c.innerHTML='<div class="lcard-cyr">'+l.cyr+'<\/div>'+
        '<div class="lcard-cyr" style="font-size:14px;color:var(--muted)">'+l.cyr.toLowerCase()+'<\/div>'+
        '<div class="lcard-rom">'+l.roman+'<\/div>'+
        (done[l.cyr]?'<div class="lcard-chk">✓<\/div>':'');
      c.onclick=function(){sel=i;render();};
      g.appendChild(c);
    });
    mod.appendChild(g);
    var det=document.createElement('div');det.id='ld';mod.appendChild(det);
    if(sel!==null&&p[sel]){
      var l=p[sel];
      det.innerHTML='<div class="stage"><div class="stage-cyr" style="font-size:96px">'+l.cyr+'<\/div>'+
        '<div class="stage-cyr" style="font-size:48px;color:rgba(255,255,255,.28);margin-top:-8px">'+l.cyr.toLowerCase()+'<\/div>'+
        '<div class="stage-sub">'+l.sound+'<\/div><\/div>'+
        '<div class="controls" id="lctrl"><\/div>';
      var ctrl=document.getElementById('lctrl');
      ctrl.appendChild(hearBtn(l.cyr,0.7,'Hear'));
      ctrl.appendChild(hearBtn(l.cyr+'. '+l.cyr+'. '+l.cyr,0.5,'× 3 slowly'));
      ctrl.appendChild(micWidget(l.cyr,function(pct){if(pct>=80){done[l.cyr]=true;render();}},{roman:l.roman}));
    }
  }
  render();
}

// ── M4 SPEED FLASH ───────────────────────────────────────────────────────────
function buildFlash(){
  var mod=document.getElementById('m-flash');
  var lv=1,pool=[],idx=0,phase='idle',tiv=null,tmax=0;
  function getTime(word){if(lv===3)return 5;var len=word?word.length:4;if(lv===1)return Math.max(2,Math.round(0.8+len*0.35));return Math.max(2,Math.round(0.5+len*0.28));}
  function stopT(){if(tiv){clearInterval(tiv);tiv=null;}}
  function render(){
    mod.innerHTML='<h2 class="stitle">⚡ Speed Flash<\/h2><p class="sdesc">A word flashes on screen. Read it aloud before time runs out — then 🎤 to check.<\/p>';
    mod.appendChild(levelBar(lv,function(v){lv=v;stopT();phase='idle';render();}));
    insertBanner(mod);
    if(phase==='idle'){
      mod.insertAdjacentHTML('beforeend',
        '<div class="stage"><div class="stage-cyr" style="font-size:52px;color:rgba(255,255,255,.25)">⚡<\/div><div class="stage-sub">Press Start when ready<\/div><\/div>'+
        '<div style="text-align:center;margin-top:8px"><button class="btn btn-ink" id="fls">Start<\/button><\/div>'+
        '<div class="info-box" style="margin-top:14px">Each word shows for <strong>'+getTime()+'s<\/strong>. Read it aloud. When the timer ends, the mic appears.<\/div>'
      );
      document.getElementById('fls').onclick=function(){
        var src=(lv===1?WL1:lv===2?WL2:WL3).slice();
        pool=shuffle(src).slice(0,15);idx=0;startT();
      };
      return;
    }
    if(idx>=pool.length||phase==='done'){
      mod.insertAdjacentHTML('beforeend','<div class="done-wrap"><div class="done-star">⚡<\/div><h3 class="done-title">Flash round done!<\/h3><p style="font-size:14px;color:var(--muted);margin-bottom:18px">'+pool.length+' words — '+(lv===1?'Beginner':lv===2?'Intermediate':'Advanced')+'.<\/p><button class="btn btn-ink" id="fla">Go again<\/button><\/div>');
      document.getElementById('fla').onclick=function(){phase='idle';render();};
      return;
    }
    var w=pool[idx];
    mod.insertAdjacentHTML('beforeend',
      '<div class="stage">'+
        '<div class="ftbar-wrap"><div class="ftbar" id="ftb" style="width:100%"><\/div><\/div>'+
        (phase==='show'
          ?'<div class="stage-cyr" style="font-size:clamp(36px,9vw,68px);letter-spacing:2px">'+w.w+'<\/div>'
          :'<div class="stage-cyr" style="font-size:68px;color:rgba(255,255,255,.12)">?<\/div>')+
        '<div id="fr" style="min-height:26px;margin-top:4px"><\/div>'+
        '<div class="stage-sub">'+(phase==='show'?'Read it aloud!':'Speak it into the mic ↓')+'<\/div>'+
      '<\/div>'+
      '<div class="controls" id="fc"><\/div>'+
      '<div class="nav-row" style="margin-top:8px"><div class="nav-ctr">'+(idx+1)+' \/ '+pool.length+'<\/div><button class="btn btn-out btn-sm" id="fsk">Skip<\/button><\/div>'
    );
    if(phase==='speak'){
      var ctrl=document.getElementById('fc');
      ctrl.appendChild(hearBtn(w.w,0.75,'Hear'));
      var rv=document.createElement('button');rv.className='hint-btn';rv.textContent='👁 Pronunciation';
      rv.onclick=function(){document.getElementById('fr').innerHTML='<div class="stage-roman">'+w.r+'<\/div>';};
      ctrl.appendChild(rv);
      ctrl.appendChild(micWidget(w.w, function(){}, {roman: w.r}));
    }
    document.getElementById('fsk').onclick=function(){stopT();idx++;if(idx<pool.length){startT();}else{phase='done';render();}};
  }
  function stopT(){if(tiv){cancelAnimationFrame(tiv);tiv=null;}}
  function startT(){
    stopT();
    var _w=pool[idx];tmax=getTime(_w?_w.w:'');phase='show';render();
    var _t0=performance.now();
    function tick(now){
      var remaining=tmax-(now-_t0)/1000;
      var f=document.getElementById('ftb');
      if(f){
        f.style.width=Math.max(0,remaining/tmax*100)+'%';
        if(remaining<=2)f.classList.add('red');else f.classList.remove('red');
      }
      if(remaining<=0){tiv=null;phase='speak';render();return;}
      tiv=requestAnimationFrame(tick);
    }
    tiv=requestAnimationFrame(tick);
  }
  render();
}

function buildPhrases(){
  var mod=document.getElementById('m-phrases');
  var lv=1,idx=0,showR=false;
  var pool=shuffle(PL1.slice());
  function rebuildPool(){pool=shuffle((lv===1?PL1:lv===2?PL2:PL3).slice());idx=0;}
  function render(){
    mod.innerHTML='<h2 class="stitle">📜 Phrase Reading<\/h2><p class="sdesc">Read the phrase aloud from the Cyrillic. Use the mic before revealing pronunciation.<\/p>';
    mod.appendChild(levelBar(lv,function(v){lv=v;rebuildPool();showR=false;render();}));
    insertBanner(mod);
    if(idx>=pool.length)idx=0;
    var ph=pool[idx];var pct=Math.round(idx/pool.length*100);
    mod.insertAdjacentHTML('beforeend',
      '<div class="pbar-wrap"><div class="pbar-fill" style="width:'+pct+'%"><\/div><\/div>'+
      '<p class="ctr">'+(idx+1)+' \/ '+pool.length+'<\/p>'+
      '<div class="stage">'+
        '<div class="stage-cyr" style="font-size:clamp(20px,4.5vw,34px);line-height:1.4;padding:0 8px">'+ph.c+'<\/div>'+
        (showR?'<div class="stage-roman" style="font-size:13px;line-height:1.5;margin-top:8px;letter-spacing:1px">'+ph.r+'<\/div>':'')+
        '<div class="stage-en" style="margin-top:8px">'+ph.e+'<\/div>'+
      '<\/div>'+
      '<div class="controls" id="pc"><\/div>'+
      '<div class="nav-row">'+
        '<button class="btn btn-out btn-sm" id="pp">← Prev<\/button>'+
        '<div class="nav-ctr">'+(idx+1)+'\/'+pool.length+'<\/div>'+
        '<button class="btn btn-ink btn-sm" id="pn">Next →<\/button>'+
      '<\/div>'
    );
    var ctrl=document.getElementById('pc');
    ctrl.appendChild(hearBtn(ph.c,0.78,'Hear'));
    if(lv>=2)ctrl.appendChild(hearBtn(ph.c,0.50,'Slowly'));
    if(!showR){var rb=document.createElement('button');rb.className='hint-btn';rb.textContent='👁 Pronunciation';rb.onclick=function(){showR=true;render();};ctrl.appendChild(rb);}

    // Score against romanization so the phonetically correct pronunciation
    // (as spoken by the Hear button TTS) is the actual reference.
    ctrl.appendChild(micWidget(ph.c, function(scorePct){
      // Reveal romanization after scoring so user can see correct phonetics
      if(!showR){
        showR=true;
        var stage=mod.querySelector('.stage');
        if(stage&&!stage.querySelector('.stage-roman')){
          var rd=document.createElement('div');
          rd.className='stage-roman';
          rd.style.cssText='font-size:13px;line-height:1.5;margin-top:8px;letter-spacing:1px';
          rd.textContent=ph.r;
          stage.appendChild(rd);
        }
      }
      // Update nav counter
      var ctr=mod.querySelector('.nav-ctr');
      if(ctr){
        var icon=scorePct>=80?'✓ ':scorePct>=50?'≈ ':'✗ ';
        var col=scorePct>=80?'var(--green)':scorePct>=50?'var(--gold)':'var(--red)';
        ctr.style.color=col;
        ctr.textContent=icon+(idx+1)+'\/'+pool.length+' — '+scorePct+'%';
      }
    }, {roman: ph.r}));
    document.getElementById('pp').disabled=idx===0;
    document.getElementById('pp').onclick=function(){if(idx>0){idx--;showR=false;render();}};
    document.getElementById('pn').onclick=function(){idx=(idx+1)%pool.length;if(idx===0){pool=shuffle((lv===1?PL1:lv===2?PL2:PL3).slice());}else{shuffleRemaining(pool,idx);}showR=false;render();};
  }
  render();
}

// ── M6 FLUENCY RUN ───────────────────────────────────────────────────────────
function buildRun(){
  var mod=document.getElementById('m-run');
  var mode=null,items=[],idx=0,scores=[],streak=0,best=0;
  var ultraMult=1,ultraCombo=0,ultraTimer=null;

  // Passage state
  var passagePick=null, passageLineIdx=0, passageScores=[];

  function avg(){if(!scores.length)return 0;return Math.round(scores.reduce(function(a,b){return a+b;},0)/scores.length);}
  function stopTimer(){if(ultraTimer){clearInterval(ultraTimer);ultraTimer=null;}}

  function render(){
    mod.innerHTML='';
    var bg=document.createElement('div');bg.className='run-bg';mod.appendChild(bg);
    if(!mode){renderPicker(bg);}
    else if(mode==='passage'){renderPassageMode(bg);}
    else if(idx>=items.length){renderDone(bg);}
    else{renderQ(bg);}
  }

  function renderPicker(bg){
    bg.insertAdjacentHTML('beforeend',
      '<div class="run-title">🔥 Fluency Run<\/div>'+
      '<div class="run-sub">Advanced practice — no easy exercises here.<\/div>'+
      '<div class="run-mgrid" id="rmg"><\/div>'
    );
    var g=document.getElementById('rmg');
    [
      {id:'hardwords', icon:'📖', label:'Hard Words',       desc:'WL3 — complex vocabulary, no hints.'},
      {id:'advanced',  icon:'📜', label:'Advanced Phrases', desc:'PL3 — complex sentences, formal register.'},
      {id:'literature',icon:'📚', label:'Literature Run',   desc:'Real sentences from Pushkin, Tolstoy, Dostoevsky and more. Timed.'},
      {id:'passage',   icon:'📄', label:'Passage Reading',  desc:'Read a full literary excerpt line by line.'},
      {id:'ultra',     icon:'💀', label:'ULTRA',            desc:'WL3 + PL3 + Literature interleaved. Timed. Combo multiplier.'},
    ].forEach(function(m){
      var c=document.createElement('div');
      c.className='run-mc';
      c.innerHTML='<div class="run-mc-icon">'+m.icon+'<\/div><div class="run-mc-label">'+m.label+'<\/div><div class="run-mc-desc">'+m.desc+'<\/div>';
      c.onclick=function(){
        stopTimer();
        if(m.id==='passage'){mode='passage';passagePick=null;passageLineIdx=0;passageScores=[];render();return;}
        mode=m.id;
        if(m.id==='hardwords') items=shuffle(WL3.slice()).slice(0,100).map(function(w){return{c:w.w,r:w.r,e:w.e,t:'word',time:0};});
        else if(m.id==='advanced') items=shuffle(PL3.slice()).slice(0,100).map(function(p){return{c:p.c,r:p.r,e:p.e,t:'phrase',time:0};});
        else if(m.id==='literature') items=shuffle(HARD_SENTENCES).slice(0,100).map(function(s){return{c:s.c,r:s.r,e:s.e,t:'sentence',src:s.src,time:22};});
        else if(m.id==='ultra') items=buildUltraItems();
        idx=0;scores=[];streak=0;best=0;ultraMult=1;ultraCombo=0;
        render();
      };
      g.appendChild(c);
    });
  }

  function renderPassageMode(bg){
    if(!passagePick && passagePick!==0){
      bg.insertAdjacentHTML('beforeend',
        '<div class="run-title">📄 Passage Reading<\/div>'+
        '<div class="run-sub">Choose a text — read each line aloud.<\/div>'+
        '<div style="display:flex;flex-direction:column;gap:10px;margin-top:8px" id="plist"><\/div>'+
        '<div style="margin-top:14px"><button class="btn-ghost" id="pback">← Back<\/button><\/div>'
      );
      var list=document.getElementById('plist');
      PASSAGES.forEach(function(p,pi){
        var btn=document.createElement('div');
        btn.className='run-mc';
        btn.innerHTML='<div class="run-mc-label">'+p.title+'<\/div><div class="run-mc-desc" style="color:rgba(255,165,40,.55)">'+p.author+' &nbsp;·&nbsp; '+p.lines.length+' lines<\/div>';
        btn.onclick=function(){passagePick=pi;passageLineIdx=0;passageScores=[];render();};
        list.appendChild(btn);
      });
      document.getElementById('pback').onclick=function(){mode=null;render();};
      return;
    }

    var pass=PASSAGES[passagePick];

    if(passageLineIdx>=pass.lines.length){
      var a=passageScores.length?Math.round(passageScores.reduce(function(s,v){return s+v;},0)/passageScores.length):0;
      var grd=a>=90?'S':a>=80?'A':a>=65?'B':a>=50?'C':'D';
      var gc={S:'#ffd700',A:'#ff9040',B:'#6ddb88',C:'#aaa',D:'#ff7070'}[grd];
      bg.insertAdjacentHTML('beforeend',
        '<div style="text-align:center;padding:16px 0">'+
        '<div style="font-size:10px;letter-spacing:3px;color:rgba(255,165,40,.5);margin-bottom:8px;text-transform:uppercase">Passage complete<\/div>'+
        '<div style="font-family:Playfair Display,serif;font-size:70px;color:'+gc+';text-shadow:0 0 28px '+gc+'88;margin-bottom:4px">'+grd+'<\/div>'+
        '<div style="color:var(--gl);font-size:22px;font-weight:600;margin-bottom:4px">'+a+'% average<\/div>'+
        '<div style="color:rgba(255,255,255,.4);font-size:12px;margin-bottom:4px">'+pass.title+'<\/div>'+
        '<div style="color:rgba(255,165,40,.5);font-size:11px;font-style:italic;margin-bottom:16px">'+pass.author+'<\/div>'+
        '<div style="background:rgba(255,255,255,.04);border-radius:4px;padding:12px;margin-bottom:18px;text-align:left">'+
        pass.lines.map(function(l,i){
          var sc=passageScores[i]||0;
          var col=sc>=80?'#6ddb88':sc>=50?'#ffc060':'#ff7070';
          return '<div style="display:flex;gap:8px;align-items:baseline;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.05)">'+
            '<span style="color:'+col+';font-size:11px;min-width:32px">'+sc+'%<\/span>'+
            '<span style="color:rgba(255,255,255,.65);font-size:13px;font-family:Playfair Display,serif">'+l.c+'<\/span>'+
            '<\/div>';
        }).join('')+
        '<\/div>'+
        '<div style="display:flex;gap:9px;justify-content:center;flex-wrap:wrap">'+
          '<button class="btn btn-out" id="pb2">Choose passage<\/button>'+
          '<button class="btn btn-red" id="pb3">Again 💀<\/button>'+
        '<\/div><\/div>'
      );
      document.getElementById('pb2').onclick=function(){passagePick=null;passageLineIdx=0;passageScores=[];render();};
      document.getElementById('pb3').onclick=function(){passageLineIdx=0;passageScores=[];render();};
      return;
    }

    var line=pass.lines[passageLineIdx];
    var pct=Math.round(passageLineIdx/pass.lines.length*100);
    var dots=pass.lines.map(function(_,i){
      if(i<passageLineIdx){var sc=passageScores[i]||0;return '<span style="color:'+(sc>=80?'#6ddb88':sc>=50?'#ffc060':'#ff7070')+'">●<\/span>';}
      return '<span style="color:'+(i===passageLineIdx?'rgba(255,165,40,.8)':'rgba(255,255,255,.13)')+'">●<\/span>';
    }).join('');

    bg.insertAdjacentHTML('beforeend',
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
        '<div style="font-size:10px;color:rgba(255,165,40,.55);letter-spacing:1px">'+pass.author.toUpperCase()+'<\/div>'+
        '<div class="run-num">'+(passageLineIdx+1)+'\/ '+pass.lines.length+'<\/div>'+
      '<\/div>'+
      '<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px;line-height:1">'+dots+'<\/div>'+
      '<div class="pbar-wrap"><div class="pbar-fill" style="width:'+pct+'%"><\/div><\/div>'+
      '<div style="background:rgba(255,255,255,.04);border-radius:4px;padding:12px 14px;margin-bottom:14px;font-family:Playfair Display,serif;line-height:2;font-size:clamp(13px,3vw,16px)">'+
      pass.lines.map(function(l,i){
        if(i===passageLineIdx) return '<span style="color:#fff;font-size:clamp(15px,3.5vw,20px);text-shadow:0 0 12px rgba(200,146,42,.5)">'+l.c+'<\/span> ';
        if(i<passageLineIdx){var sc=passageScores[i]||0;return '<span style="color:'+(sc>=80?'rgba(109,219,136,.5)':sc>=50?'rgba(255,192,96,.4)':'rgba(255,112,112,.4)')+'">'+l.c+'<\/span> ';}
        return '<span style="color:rgba(255,255,255,.18)">'+l.c+'<\/span> ';
      }).join('')+
      '<\/div>'+
      '<div id="pcontrols" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px"><\/div>'+
      '<div id="pres"><\/div>'+
      (line.e?transBox(line.e):'')+
      '<div style="margin-top:8px"><button class="btn-ghost" id="pback2">← Passages<\/button><\/div>'
    );

    var ctrl=document.getElementById('pcontrols');
    ctrl.appendChild(hearBtn(line.c,0.70,'Hear'));
    ctrl.appendChild(hearBtn(line.c,0.48,'Slowly'));
    var rv=document.createElement('button');rv.className='hint-btn';rv.textContent='👁 Romanization';
    rv.onclick=function(){
      var el=document.getElementById('prom');
      if(el)el.innerHTML='<div style="font-size:12px;color:var(--gl);letter-spacing:.5px;margin-top:4px">'+line.r+'<\/div>';
    };
    ctrl.appendChild(rv);
    var romDiv=document.createElement('div');romDiv.id='prom';ctrl.appendChild(romDiv);

    ctrl.appendChild(micWidget(line.c,function(sc){
      passageScores[passageLineIdx]=sc;
      var res=document.getElementById('pres');if(!res)return;
      var cls=sc>=80?'great':sc>=50?'close':'miss';
      var icon=sc>=80?'✓':sc>=50?'≈':'✗';
      res.innerHTML='<div class="run-result '+cls+'" style="text-align:center;padding:8px 12px">'+icon+' '+sc+'%<\/div>';
      var nb=document.createElement('button');nb.className='run-next';
      nb.textContent=passageLineIdx<pass.lines.length-1?'Next line →':'See results →';
      nb.onclick=function(){passageLineIdx++;render();};
      res.appendChild(nb);
    }));

    document.getElementById('pback2').onclick=function(){passagePick=null;passageLineIdx=0;passageScores=[];render();};
  }

  function renderQ(bg){
    var it=items[idx];var a=avg();
    var isTimed=(mode==='ultra'||mode==='literature');
    var dots='';
    for(var i=0;i<items.length;i++){
      var col=i<idx?(scores[i]>=80?'#6ddb88':scores[i]>=50?'#ffc060':'#ff7070'):'rgba(255,255,255,.13)';
      dots+='<span style="color:'+col+'">●<\/span>';
    }
    var typeLabels={word:'📖 WORD',phrase:'📜 PHRASE',sentence:'📚 SENTENCE'};
    var _wlen=it.c.length;
    var cySize=it.t==='sentence'?'clamp(14px,3.2vw,22px)':it.t==='phrase'?(_wlen<=40?'clamp(18px,4vw,30px)':'clamp(14px,3.2vw,22px)'):(_wlen<=6?'clamp(30px,7vw,52px)':_wlen<=10?'clamp(24px,5.5vw,44px)':_wlen<=15?'clamp(18px,4vw,34px)':'clamp(13px,3vw,22px)');
    var sentSrc=it.src?'<div style="font-size:10px;color:rgba(180,60,255,.5);margin-top:6px;letter-spacing:1px;font-style:italic">'+it.src+'<\/div>':'';;
    bg.insertAdjacentHTML('beforeend',
      '<div class="run-hud">'+
        '<div class="run-avg">'+(a?a+'% avg':'—')+'<\/div>'+
        '<div class="run-streak">🔥 <strong>'+streak+'<\/strong>'+(isTimed&&ultraMult>1?' ×'+ultraMult:'')+'<\/div>'+
        '<div class="run-num">'+(idx+1)+'\/ '+items.length+'<\/div>'+
      '<\/div>'+
      '<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:12px;line-height:1">'+dots+'<\/div>'+
      (isTimed?'<div class="ultra-timer-wrap"><div class="ultra-timer-bar" id="utb"><\/div><\/div>':'')+
      '<div class="run-stage">'+
        '<div class="run-tag">'+(typeLabels[it.t]||it.t.toUpperCase())+'<\/div>'+
        '<div class="run-cyr" style="font-size:'+cySize+'">'+it.c+'<\/div>'+
        (it.e&&it.t!=='sentence'?'<div class="stage-en" style="margin-top:6px;font-size:13px">'+it.e+'<\/div>':'')+
        sentSrc+
        (isTimed&&ultraMult>1?'<div style="color:var(--orange-l);font-size:12px;margin-top:4px">×'+ultraMult+' combo<\/div>':'')+
        '<div id="rh" style="display:flex;gap:7px;justify-content:center;margin-top:12px;flex-wrap:wrap"><\/div>'+
        '<div id="rr2" style="min-height:16px;margin-top:4px"><\/div>'+
      '<\/div>'+
      '<div id="rm" style="margin-bottom:8px"><\/div>'+
      '<div id="rres"><\/div>'+
      (it.e?transBox(it.e):'')+
      '<div style="margin-top:6px;display:flex;justify-content:space-between;align-items:center">'+
        '<button class="btn-ghost" id="rback">← Change mode<\/button>'+
        '<button class="btn-ghost" id="rskip" style="color:rgba(255,255,255,.4)">Skip →<\/button>'+
      '<\/div>'
    );
    var hr=document.getElementById('rh');
    var rate=it.t==='sentence'?0.65:it.t==='phrase'?0.72:0.82;
    hr.appendChild(hearBtn(it.c,rate,'Hear'));
    if(it.t!=='word') hr.appendChild(hearBtn(it.c,0.48,'Slowly'));
    var rv=document.createElement('button');rv.className='hint-btn';rv.textContent='👁 Pronunciation';
    rv.onclick=function(){document.getElementById('rr2').innerHTML='<div style="font-size:12px;color:var(--gl);letter-spacing:.5px;line-height:1.5">'+it.r+'<\/div>';};
    document.getElementById('rm').appendChild(rv);
    document.getElementById('rm').appendChild(micWidget(it.c,function(pct){
      stopTimer();
      scores[idx]=pct;
      var bonus=pct;
      if(pct>=80){
        streak++;ultraCombo++;
        if(ultraCombo>=3)ultraMult=Math.min(5,1+Math.floor(ultraCombo/2));
        bonus=Math.min(100,Math.round(pct*ultraMult));
        if(streak>best)best=streak;
        if(isTimed&&ultraMult>1)comboFlash('×'+ultraMult+'!');
      } else {streak=0;ultraCombo=0;ultraMult=1;}
      var res=document.getElementById('rres');if(!res)return;
      var cls=pct>=80?'great':pct>=50?'close':'miss';
      var icon=pct>=80?'✓':pct>=50?'≈':'✗';
      var extra=isTimed&&pct>=80&&ultraMult>1?' (×'+ultraMult+' → '+bonus+'%!)':'';;
      res.innerHTML='<div class="run-result '+cls+'">'+icon+' '+pct+'%'+extra+'<\/div>';
      var nb=document.createElement('button');nb.className='run-next';
      nb.textContent=idx<items.length-1?'Next →':'See results →';
      nb.onclick=function(){idx++;render();};
      res.appendChild(nb);
    }));
    document.getElementById('rback').onclick=function(){stopTimer();mode=null;render();};
    document.getElementById('rskip').onclick=function(){stopTimer();streak=0;ultraCombo=0;ultraMult=1;idx++;render();};
    if(isTimed) setTimeout(function(){startTimer(it.time||18);},300);
  }

  function startTimer(sec){
    stopTimer();
    var s=sec;
    var fill=document.getElementById('utb');
    if(fill){fill.style.width='100%';fill.classList.remove('warn');}
    ultraTimer=setInterval(function(){
      s--;
      var fill=document.getElementById('utb');
      if(fill){fill.style.width=Math.max(0,s/sec*100)+'%';if(s<=5)fill.classList.add('warn');}
      if(s<=0){
        stopTimer();
        scores[idx]=0;streak=0;ultraCombo=0;ultraMult=1;
        var res=document.getElementById('rres');
        if(res){
          res.innerHTML='<div class="run-result miss">⏰ Time up! — <em style="font-size:11px">'+items[idx].r+'<\/em><\/div>';
          var nb=document.createElement('button');nb.className='run-next';
          nb.textContent=idx<items.length-1?'Next →':'See results →';
          nb.onclick=function(){idx++;render();};
          res.appendChild(nb);
        }
      }
    },1000);
  }

  function renderDone(bg){
    stopTimer();
    var a=avg();
    var grd=a>=90?'S':a>=80?'A':a>=65?'B':a>=50?'C':'D';
    var gc={S:'#ffd700',A:'#ff9040',B:'#6ddb88',C:'#aaa',D:'#ff7070'}[grd];
    var perf=scores.filter(function(s){return s>=80;}).length;
    var msg=a>=90?'LEGENDARY 💀🔥':a>=80?'Excellent!':a>=65?'Solid!':a>=50?'Keep grinding!':'Back to basics.';
    bg.insertAdjacentHTML('beforeend',
      '<div style="text-align:center;padding:12px 0">'+
      '<div style="font-size:10px;letter-spacing:3px;color:rgba(180,60,255,.6);margin-bottom:8px;text-transform:uppercase">Run complete<\/div>'+
      '<div class="run-grade" style="color:'+gc+';text-shadow:0 0 30px '+gc+'88;font-size:80px">'+grd+'<\/div>'+
      '<div class="run-final-score" style="color:var(--gl)">'+a+'% average<\/div>'+
      '<div class="run-final-sub">'+perf+' \/ '+items.length+' above 80%'+(best?' &nbsp;·&nbsp; Best streak: '+best:'')+'<\/div>'+
      '<div style="color:'+gc+';font-size:14px;margin-bottom:20px">'+msg+'<\/div>'+
      '<div style="display:flex;gap:9px;justify-content:center;flex-wrap:wrap">'+
        '<button class="btn btn-out" id="rdp">Change mode<\/button>'+
        '<button class="btn btn-red" id="rda">Run again 💀<\/button>'+
      '<\/div><\/div>'
    );
    document.getElementById('rdp').onclick=function(){mode=null;render();};
    document.getElementById('rda').onclick=function(){
      if(mode==='ultra')items=buildUltraItems();
      idx=0;scores=[];streak=0;best=0;ultraMult=1;ultraCombo=0;render();
    };
  }

  function comboFlash(txt){
    var el=document.createElement('div');el.className='combo-flash';el.textContent=txt;
    document.body.appendChild(el);
    setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},850);
  }

  render();
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
var BUILDERS={letters:buildLetters,syllables:buildSyllables,words:buildWords,flash:buildFlash,phrases:buildPhrases,run:buildRun};
showTab('letters');
</script>
