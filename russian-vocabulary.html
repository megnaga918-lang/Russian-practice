<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Russian Vocabulary</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1410;--paper:#f5f0e8;--p2:#ede6d6;
  --gold:#c8922a;--gl:#e8b84b;
  --red:#8b2020;--green:#1e5c2e;
  --orange:#b05010;--orange-l:#e87030;
  --muted:#7a6f60;--card:#faf7f2;--border:#d4c9b0;
}
body{background:var(--paper);color:var(--ink);font-family:'Source Serif 4',Georgia,serif;min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:0 14px 60px}
.header{text-align:center;padding:26px 0 18px;border-bottom:2px solid var(--border);margin-bottom:22px}
.eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.header h1{font-family:'Playfair Display',serif;font-size:clamp(22px,5vw,38px);line-height:1.1;margin-bottom:6px}
.header h1 span{color:var(--gold)}
.header-sub{font-size:13px;color:var(--muted);font-style:italic}
.nav{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:22px;border-bottom:1px solid var(--border);padding-bottom:12px}
.nav-btn{padding:7px 11px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);border-radius:2px;cursor:pointer;font-family:'Source Serif 4',serif;font-size:11px;transition:all .18s;display:flex;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent;user-select:none}
.nav-btn:hover{border-color:var(--gold);color:var(--ink)}
.nav-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.module{display:none}.module.active{display:block}
.level-bar{display:flex;gap:5px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.level-bar label{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-right:4px}
.lbtn{padding:5px 13px;border:1.5px solid var(--border);background:none;border-radius:20px;font-size:12px;cursor:pointer;font-family:'Source Serif 4',serif;color:var(--muted);transition:all .15s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.lbtn:hover{border-color:var(--gold);color:var(--gold)}
.lbtn.l1.on{background:var(--green);color:#fff;border-color:var(--green)}
.lbtn.l2.on{background:#7a5000;color:#fff;border-color:#7a5000}
.lbtn.l3.on{background:var(--red);color:#fff;border-color:var(--red)}
.lbtn.l4{border-color:var(--orange)}
.lbtn.l4:hover{border-color:var(--orange-l);color:var(--orange-l)}
.lbtn.l4.on{background:linear-gradient(135deg,var(--orange),var(--orange-l));color:#fff;border-color:var(--orange-l)}
.ctrl-bar{display:flex;gap:6px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.ctrl-bar label{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-right:2px}
.pill{padding:5px 13px;border:1.5px solid var(--border);background:none;border-radius:20px;font-size:12px;cursor:pointer;font-family:'Source Serif 4',serif;color:var(--muted);transition:all .15s;-webkit-tap-highlight-color:transparent}
.pill:hover{border-color:var(--gold);color:var(--gold)}
.pill.on-ink{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.pill.on-gold{background:var(--gold);color:#fff;border-color:var(--gold)}
.stage{background:var(--ink);border-radius:6px;padding:26px 20px;text-align:center;margin-bottom:16px;min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.stage-lang{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,165,40,.45);margin-bottom:10px}
.stage-word{font-family:'Playfair Display',serif;color:var(--gl);line-height:1.2}
.stage-note{font-size:11px;color:rgba(255,165,40,.55);margin-top:6px;font-style:italic}
.stage-lv{font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-top:8px;opacity:.55}
.challenge-stage{background:linear-gradient(160deg,#1a0e06,#0e0804);border:1.5px solid rgba(232,135,48,.2);border-radius:6px;padding:26px 20px;text-align:center;margin-bottom:16px;min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.challenge-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(232,135,48,.5);margin-bottom:10px}
.challenge-sent{font-family:'Playfair Display',serif;color:#fff;line-height:1.4}
.vocab-input{width:100%;padding:14px 16px;font-size:17px;font-family:'Playfair Display',serif;border:2px solid var(--border);border-radius:4px;background:var(--card);color:var(--ink);outline:none;transition:border-color .15s,background .15s;letter-spacing:.5px}
.vocab-input:focus{border-color:var(--gold)}
.vocab-input.ok{border-color:var(--green)!important;background:#f0fbf4}
.vocab-input.close{border-color:var(--gold)!important;background:#fff9ee}
.vocab-input.no{border-color:var(--red)!important;background:#ffeaea}
.rbox{padding:11px 14px;border-radius:4px;font-size:13.5px;line-height:1.6;margin-bottom:12px;border:1.5px solid}
.rbox.great{background:#e8f7ee;border-color:var(--green);color:var(--green)}
.rbox.close{background:#fff9ee;border-color:var(--gold);color:#7a5000}
.rbox.miss{background:#ffeaea;border-color:var(--red);color:var(--red)}
.rscore{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;margin-right:6px}
.rinfo{font-size:12px;opacity:.8;margin-top:2px}
.btn{padding:8px 18px;border:2px solid;border-radius:2px;cursor:pointer;font-family:'Source Serif 4',serif;font-size:13px;transition:all .15s;font-weight:600;-webkit-tap-highlight-color:transparent}
.btn-ink{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn-ink:hover{background:#2d2418}
.btn-out{background:none;color:var(--ink);border-color:var(--border)}
.btn-out:hover{border-color:var(--gold);color:var(--gold)}
.btn-red{background:var(--red);color:#fff;border-color:var(--red)}
.btn-orange{background:var(--orange-l);color:#fff;border-color:var(--orange-l)}
.btn-orange:hover{background:var(--orange)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-ghost{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;font-family:'Source Serif 4',serif;padding:4px 0}
.hear-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:1.5px solid var(--gold);background:rgba(200,146,42,.08);border-radius:20px;cursor:pointer;font-size:13px;color:var(--gl);font-family:'Source Serif 4',serif;transition:all .15s}
.hear-btn:hover,.hear-btn.on{background:var(--gold);color:#fff;border-color:var(--gold)}
.pbar-wrap{width:100%;background:var(--border);height:3px;border-radius:2px;margin-bottom:4px}
.pbar-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}
.pctr{font-size:11px;color:var(--muted);text-align:right;margin-bottom:12px}
.stats-hud{display:flex;gap:18px;margin-bottom:14px;flex-wrap:wrap}
.stat-val{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);line-height:1}
.stat-lbl{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.timer-wrap{width:100%;background:rgba(0,0,0,.1);height:6px;border-radius:3px;overflow:hidden;margin-bottom:14px}
.timer-bar{height:100%;background:var(--gold);border-radius:3px;transition:width 1s linear}
.timer-bar.warn{background:var(--red);animation:tbWarn .6s ease-in-out infinite}
@keyframes tbWarn{0%,100%{opacity:1}50%{opacity:.5}}
.wgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;margin-bottom:6px}
.wcard{background:var(--card);border:1.5px solid var(--border);border-radius:3px;padding:9px 11px;transition:border-color .15s}
.wcard:hover{border-color:var(--gold)}
.wcard-ru{font-family:'Playfair Display',serif;font-size:14px;line-height:1.3}
.wcard-en{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.wcard-note{font-size:10px;color:var(--gold);margin-top:1px}
.scard{background:var(--card);border:1.5px solid rgba(184,80,16,.2);border-radius:3px;padding:10px 12px}
.scard-ru{font-family:'Playfair Display',serif;font-size:13px;line-height:1.4}
.scard-en{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;font-style:italic}
.done-wrap{text-align:center;padding:36px 16px}
.done-msg{font-size:13px;color:var(--muted);margin-bottom:4px;font-style:italic}
.info-box{background:var(--p2);border-radius:3px;padding:10px 13px;margin-bottom:12px;font-size:13px;line-height:1.6}
.info-box.challenge-info{background:rgba(184,80,16,.08);border:1.5px solid rgba(184,80,16,.2)}
.stitle{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:4px}
.sdesc{font-size:13px;color:var(--muted);margin-bottom:12px;font-style:italic;line-height:1.5}
.kbd-hint{font-size:11px;color:rgba(200,146,42,.65);margin-bottom:7px;font-style:italic}
.section-sep{border:none;border-top:1px solid var(--border);margin:18px 0}
.combo-flash{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-family:'Playfair Display',serif;font-size:60px;color:var(--gl);text-shadow:0 0 30px rgba(200,146,42,.8);pointer-events:none;animation:cAnim .8s ease forwards;z-index:999}
@keyframes cAnim{0%{opacity:1;transform:translate(-50%,-60%)}100%{opacity:0;transform:translate(-50%,-110%)}}
@media(max-width:480px){.wgrid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}.stats-hud{gap:12px}}
</style>
</head>

<div class="app">
  <div class="header">
    <div class="eyebrow">Vocabulary Course</div>
    <h1>Learning <span>Russian</span></h1>
    <div class="header-sub">See the word — recall the meaning — type it out</div>
  </div>
  <nav class="nav" id="nav"></nav>
  <div id="modules"></div>
</div>
<script>
// ── TTS ───────────────────────────────────────────────────────────────────────
var _vx=[],_vok=false;
function _lv(){var v=window.speechSynthesis?window.speechSynthesis.getVoices():[];if(v.length){_vx=v;_vok=true;}}
if(window.speechSynthesis){_lv();window.speechSynthesis.onvoiceschanged=_lv;var _vt=setInterval(function(){_lv();if(_vok)clearInterval(_vt);},200);setTimeout(function(){clearInterval(_vt);},5000);}
function _ru(){return _vx.find(function(v){return v.lang==='ru-RU';})||_vx.find(function(v){return v.lang.startsWith('ru');})||null;}
function hearBtn(txt,rate,lbl){
  var b=document.createElement('button');b.className='hear-btn';b.innerHTML='🔊 '+(lbl||'Hear');
  var _p=false,_et=null;
  function _done(){_p=false;if(_et){clearTimeout(_et);_et=null;}b.classList.remove('on');}
  b.onclick=function(e){e.stopPropagation();if(_p){window.speechSynthesis.cancel();_done();return;}
    _p=true;b.classList.add('on');window.speechSynthesis.cancel();
    setTimeout(function(){var u=new SpeechSynthesisUtterance(txt);u.lang='ru-RU';u.rate=rate||0.85;u.pitch=1;
      var r=_ru();if(r)u.voice=r;u.onend=_done;u.onerror=_done;
      var ms=Math.max(2000,txt.length*(rate?800/rate:940))+800;_et=setTimeout(_done,ms);
      window.speechSynthesis.speak(u);},55);};
  return b;
}
// ── HELPERS ───────────────────────────────────────────────────────────────────
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function norm(s){return s.toLowerCase().replace(/[.,!?;:\-()«»—–'''""]/g,'').replace(/\s+/g,' ').trim();}
function lev(a,b){if(a===b)return 0;var m=a.length,n=b.length;if(!m)return n;if(!n)return m;
  var p=[],c=[];for(var j=0;j<=n;j++)p[j]=j;
  for(var i=1;i<=m;i++){c[0]=i;for(var jj=1;jj<=n;jj++)c[jj]=a[i-1]===b[jj-1]?p[jj-1]:1+Math.min(p[jj-1],p[jj],c[jj-1]);p=c.slice();}return p[n];}
function checkTyped(typed,correct){
  var t=norm(typed);if(!t)return'miss';
  var opts=correct.split('/').map(function(s){return norm(s);});
  for(var i=0;i<opts.length;i++){if(t===opts[i])return'exact';}
  for(var i=0;i<opts.length;i++){var mx=Math.max(t.length,opts[i].length,1);if(lev(t,opts[i])<=Math.max(1,Math.floor(mx*.2)))return'close';}
  return'miss';
}
function checkSentence(typed,correct){
  var t=norm(typed);if(!t)return{result:'miss',score:0};
  var alts=correct.split('|').map(function(s){return norm(s);});
  for(var i=0;i<alts.length;i++){
    if(t===alts[i])return{result:'exact',score:100};
    var mx=Math.max(t.length,alts[i].length,1);
    if(lev(t,alts[i])<=Math.floor(mx*.12))return{result:'exact',score:95};
  }
  var cWords=alts[0].split(' ').filter(function(w){return w.length>2;});
  var tWords=t.split(' ');var matched=0;
  cWords.forEach(function(cw){for(var i=0;i<tWords.length;i++){if(tWords[i]===cw||lev(tWords[i],cw)<=1){matched++;return;}}});
  var ratio=cWords.length>0?matched/cWords.length:0;
  var bestLev=9999;alts.forEach(function(a){bestLev=Math.min(bestLev,lev(t,a));});
  var levSim=1-bestLev/Math.max(t.length,alts[0].length,1);
  var combined=(ratio*.6+levSim*.4);
  if(combined>=0.80)return{result:'exact',score:Math.round(combined*100)};
  if(combined>=0.50)return{result:'close',score:Math.round(combined*100)};
  return{result:'miss',score:Math.round(combined*100)};
}
function comboFlash(txt){var el=document.createElement('div');el.className='combo-flash';el.textContent=txt;document.body.appendChild(el);setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},850);}
function firstAlt(s){return s.split('/')[0].split('|')[0].trim();}
function gradeColor(g){return{S:'#ffd700',A:'#ff9040',B:'#6ddb88',C:'#aaa',D:'#ff7070'}[g];}
function gradeMsg(a){return a>=90?'Outstanding 🔥':a>=80?'Excellent!':a>=65?'Solid progress!':a>=50?'Keep practising!':'Back to the word list.';}
function lvLabel(l){return l===1?'🟢 Beginner':l===2?'🟡 Intermediate':l===3?'🔴 Advanced':'🔥 Challenge';}
function lvColor(l){return l===1?'var(--green)':l===2?'#c8922a':l===3?'var(--red)':'var(--orange-l)';}
function levelBar(cur,onChange){
  var d=document.createElement('div');d.className='level-bar';d.innerHTML='<label>Level:</label>';
  [[1,'🟢 Beginner'],[2,'🟡 Intermediate'],[3,'🔴 Advanced'],[4,'🔥 Challenge']].forEach(function(pair){
    var b=document.createElement('button');b.className='lbtn l'+pair[0]+(cur===pair[0]?' on':'');
    b.textContent=pair[1];b.onclick=function(){onChange(pair[0]);};d.appendChild(b);
  });
  return d;
}

// ── TAB SYSTEM ────────────────────────────────────────────────────────────────
var curTab=null,BUILDERS={};
THEMES.forEach(function(t){
  var b=document.createElement('button');b.className='nav-btn';b.id='nb-'+t.id;
  b.innerHTML='<span>'+t.icon+'</span>'+t.label;
  b.onclick=function(){showTab(t.id);};
  document.getElementById('nav').appendChild(b);
  var m=document.createElement('div');m.className='module';m.id='m-'+t.id;
  document.getElementById('modules').appendChild(m);
  BUILDERS[t.id]=function(){buildTheme(t);};
});
function showTab(id){
  if(curTab===id)return;
  THEMES.forEach(function(t){
    document.getElementById('nb-'+t.id).classList.toggle('active',t.id===id);
    document.getElementById('m-'+t.id).classList.toggle('active',t.id===id);
  });
  curTab=id;
  var m=document.getElementById('m-'+id);
  if(!m.dataset.built){BUILDERS[id]();m.dataset.built='1';}
}

// ── THEME BUILDER ─────────────────────────────────────────────────────────────
function buildTheme(theme){
  var mod=document.getElementById('m-'+theme.id);
  var lv=1,mode='typing',dir='ru2en';
  function poolWords(){return theme.words.filter(function(w){return w.lv===lv;});}
  function poolSentences(){return theme.sentences||[];}
  function getPool(){
    if(lv===4){
      var base=shuffle(poolSentences());
      if(dir==='mixed'){var all=[];base.forEach(function(s){all.push({sent:s,d:'ru2en'});all.push({sent:s,d:'en2ru'});});return shuffle(all);}
      return base.map(function(s){return{sent:s,d:dir};});
    }
    var base=shuffle(poolWords());
    if(dir==='mixed'){var all=[];base.forEach(function(w){all.push({word:w,d:'ru2en'});all.push({word:w,d:'en2ru'});});return shuffle(all);}
    return base.map(function(w){return{word:w,d:dir};});
  }

  function renderMain(){
    mod.innerHTML='<h2 class="stitle">'+theme.icon+' '+theme.label+'</h2><p class="sdesc">Type the translation to score.</p>';
    mod.appendChild(levelBar(lv,function(v){lv=v;renderMain();}));
    if(lv===4){
      mod.insertAdjacentHTML('beforeend','<div class="info-box challenge-info"><strong style="color:var(--orange-l)">🔥 Challenge</strong> — '+poolSentences().length+' sentences. Translate each in full. Keyword-based scoring — small errors are forgiven.</div>');
    } else {
      var n=poolWords().length;
      var descs={1:'<strong style="color:var(--green)">Beginner</strong> — '+n+' essential, high-frequency words.',2:'<strong style="color:#7a5000">Intermediate</strong> — '+n+' words with more context or nuance.',3:'<strong style="color:var(--red)">Advanced</strong> — '+n+' nuanced, formal, or specialised words.'};
      mod.insertAdjacentHTML('beforeend','<div class="info-box" style="font-size:12px">'+descs[lv]+'</div>');
    }
    if(lv!==4){
      var mb=document.createElement('div');mb.className='ctrl-bar';mb.innerHTML='<label>Mode:</label>';
      [{id:'typing',lbl:'📝 Typing'},{id:'speed',lbl:'⚡ Speed'}].forEach(function(m2){
        var b=document.createElement('button');b.className='pill'+(mode===m2.id?' on-ink':'');
        b.textContent=m2.lbl;b.onclick=function(){mode=m2.id;renderMain();};mb.appendChild(b);
      });
      mod.appendChild(mb);
    }
    var db=document.createElement('div');db.className='ctrl-bar';db.innerHTML='<label>Direction:</label>';
    [{id:'ru2en',lbl:'🇷🇺 → 🇬🇧'},{id:'en2ru',lbl:'🇬🇧 → 🇷🇺'},{id:'mixed',lbl:'🔀 Mixed'}].forEach(function(d2){
      var b=document.createElement('button');b.className='pill'+(dir===d2.id?' on-gold':'');
      b.textContent=d2.lbl;b.onclick=function(){dir=d2.id;renderMain();};db.appendChild(b);
    });
    mod.appendChild(db);
    if(dir==='en2ru'||dir==='mixed') mod.insertAdjacentHTML('beforeend','<div class="info-box">💡 You\'ll need to type in <strong>Russian (Cyrillic)</strong> for the Russian side.</div>');
    var lw=document.createElement('div');lw.style.cssText='text-align:center;margin:18px 0 26px';
    var lb=document.createElement('button');lb.className='btn '+(lv===4?'btn-orange':'btn-ink');
    lb.style.cssText='font-size:15px;padding:12px 34px';
    lb.textContent=lv===4?'Start Challenge 🔥':(mode==='speed'?'Start Speed Round ⚡':'Start Typing Quiz 📝');
    lb.onclick=function(){var p=getPool();if(lv===4)startChallenge(p);else if(mode==='speed')startSpeed(p);else startTyping(p);};
    lw.appendChild(lb);mod.appendChild(lw);
    mod.insertAdjacentHTML('beforeend','<hr class="section-sep">');
    if(lv===4){
      mod.insertAdjacentHTML('beforeend','<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Sentences ('+poolSentences().length+')</div>'+
        '<div style="display:flex;flex-direction:column;gap:6px">'+
        poolSentences().map(function(s){return '<div class="scard"><div class="scard-ru">'+s.ru+'</div><div class="scard-en">'+firstAlt(s.en)+'</div></div>';}).join('')+'</div>');
    } else {
      var wList=poolWords();
      mod.insertAdjacentHTML('beforeend','<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Word list ('+wList.length+')</div>'+
        '<div class="wgrid">'+
        wList.map(function(w){return '<div class="wcard"><div class="wcard-ru">'+w.ru+'</div><div class="wcard-en">'+firstAlt(w.en)+'</div>'+(w.note?'<div class="wcard-note">'+w.note+'</div>':'')+' </div>';}).join('')+'</div>');
    }
  }

  function startTyping(pool){
    var idx=0,nCorrect=0,total=0,streak=0,best=0;
    renderQ();
    function renderQ(){
      if(idx>=pool.length){renderDoneScreen(nCorrect,total,streak,best,false);return;}
      mod.innerHTML='';
      var item=pool[idx],w=item.word,d=item.d;
      var shown=d==='ru2en'?w.ru:firstAlt(w.en),answer=d==='ru2en'?w.en:w.ru,shownLang=d==='ru2en'?'Russian':'English';
      var pct=Math.round(idx/pool.length*100);
      mod.insertAdjacentHTML('beforeend',
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
          '<div style="font-size:11px;color:var(--muted);font-style:italic">'+theme.icon+' '+theme.label+' · '+lvLabel(lv)+'</div>'+
          '<button class="btn-ghost" id="tback">← Menu</button></div>'+
        '<div class="pbar-wrap"><div class="pbar-fill" style="width:'+pct+'%"></div></div>'+
        '<div class="pctr">'+(idx+1)+' / '+pool.length+'</div>'+
        '<div class="stats-hud">'+
          '<div><div class="stat-val">'+nCorrect+'</div><div class="stat-lbl">Correct</div></div>'+
          '<div><div class="stat-val">'+total+'</div><div class="stat-lbl">Done</div></div>'+
          '<div><div class="stat-val" style="color:var(--orange-l)">🔥 '+streak+'</div><div class="stat-lbl">Streak</div></div>'+
          (total>0?'<div><div class="stat-val">'+Math.round(nCorrect/total*100)+'%</div><div class="stat-lbl">Accuracy</div></div>':'')+
        '</div>'
      );
      document.getElementById('tback').onclick=renderMain;
      var wlen=shown.length;
      var wfont=wlen<=8?'clamp(34px,8vw,62px)':wlen<=16?'clamp(22px,5vw,40px)':wlen<=26?'clamp(16px,3.8vw,28px)':'clamp(13px,3vw,22px)';
      mod.insertAdjacentHTML('beforeend',
        '<div class="stage">'+
          '<div class="stage-lang">'+shownLang+'</div>'+
          '<div class="stage-word" style="font-size:'+wfont+'">'+shown+'</div>'+
          (w.note&&d==='ru2en'?'<div class="stage-note">'+w.note+'</div>':'')+
          '<div class="stage-lv" style="color:'+lvColor(w.lv)+'">'+lvLabel(w.lv)+'</div>'+
          '<div id="thear" style="margin-top:10px"></div></div>'+
        '<div class="kbd-hint">Type in '+(d==='ru2en'?'English 🇬🇧':'Russian 🇷🇺')+'</div>'+
        '<div style="margin-bottom:10px"><input type="text" class="vocab-input" id="vinput" placeholder="Type your answer…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/></div>'+
        '<div style="display:flex;gap:8px;margin-bottom:12px">'+
          '<button class="btn btn-ink" id="vsubmit">Check ✓</button>'+
          '<button class="btn btn-out btn-sm" id="vskip">Skip</button></div>'+
        '<div id="vresult"></div>'
      );
      if(d==='ru2en') document.getElementById('thear').appendChild(hearBtn(w.ru,0.82,'Hear'));
      setTimeout(function(){var i=document.getElementById('vinput');if(i)i.focus();},80);
      document.getElementById('vskip').onclick=function(){idx++;renderQ();};
      var submitted=false;
      function submit(){
        if(submitted){idx++;renderQ();return;}
        var inp=document.getElementById('vinput');if(!inp)return;
        var result=checkTyped(inp.value,answer);submitted=true;total++;
        var res=document.getElementById('vresult'),sbtn=document.getElementById('vsubmit');
        if(result==='exact'){
          nCorrect++;streak++;if(streak>best)best=streak;inp.className='vocab-input ok';
          if(streak>=3)comboFlash('🔥×'+streak);
          res.innerHTML='<div class="rbox great"><span class="rscore">✓</span>Correct!'+(streak>=3?' <span style="color:var(--orange-l)">🔥×'+streak+'</span>':'')+'</div>';
        } else if(result==='close'){
          nCorrect++;streak++;if(streak>best)best=streak;inp.className='vocab-input close';
          res.innerHTML='<div class="rbox close"><span class="rscore">≈</span>Close!<div class="rinfo">Exact: <strong>'+firstAlt(answer)+'</strong></div></div>';
        } else {
          streak=0;inp.className='vocab-input no';
          res.innerHTML='<div class="rbox miss"><span class="rscore">✗</span>Not quite.<div class="rinfo">Answer: <strong>'+firstAlt(answer)+'</strong></div></div>';
        }
        sbtn.textContent='Next →';
        if(result!=='exact'&&d==='ru2en'){var hr=document.getElementById('thear');if(hr&&!hr.querySelector('.hear-btn'))hr.appendChild(hearBtn(w.ru,0.72,'Hear'));}
      }
      document.getElementById('vsubmit').onclick=submit;
      document.getElementById('vinput').addEventListener('keydown',function(e){if(e.key==='Enter')submit();});
    }
  }

  function startSpeed(pool){
    var BATCH=Math.min(20,pool.length),items=pool.slice(0,BATCH);
    var idx=0,scores=[],streak=0,timerIv=null;
    renderQ();
    function stopTimer(){if(timerIv){clearInterval(timerIv);timerIv=null;}}
    function renderQ(){
      if(idx>=items.length){renderSpeedDone();return;}
      stopTimer();mod.innerHTML='';
      var item=items[idx],w=item.word,d=item.d;
      var shown=d==='ru2en'?w.ru:firstAlt(w.en),answer=d==='ru2en'?w.en:w.ru,shownLang=d==='ru2en'?'Russian':'English';
      var tBonus={1:3,2:1,3:0}[w.lv]||0;
      var TIME=Math.max(5,Math.min(14,Math.round(shown.replace(/\s/g,'').length*0.7)+4+tBonus));
      var nCorrect=scores.filter(function(s){return s;}).length,pct=Math.round(idx/items.length*100);
      mod.insertAdjacentHTML('beforeend',
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
          '<div style="font-size:11px;color:var(--muted);font-style:italic">'+theme.icon+' Speed · '+lvLabel(lv)+'</div>'+
          '<button class="btn-ghost" id="sback">← Menu</button></div>'+
        '<div class="stats-hud">'+
          '<div><div class="stat-val">'+nCorrect+'</div><div class="stat-lbl">Correct</div></div>'+
          '<div><div class="stat-val" style="color:var(--orange-l)">🔥 '+streak+'</div><div class="stat-lbl">Streak</div></div>'+
          '<div><div class="stat-val">'+(idx+1)+'/'+items.length+'</div><div class="stat-lbl">Progress</div></div></div>'+
        '<div class="timer-wrap"><div class="timer-bar" id="stbar" style="width:100%;transition:width 1s linear"></div></div>'+
        '<div class="pbar-wrap"><div class="pbar-fill" style="width:'+pct+'%"></div></div>'
      );
      document.getElementById('sback').onclick=function(){stopTimer();renderMain();};
      var wlen=shown.length;
      var wfont=wlen<=8?'clamp(32px,7vw,58px)':wlen<=16?'clamp(20px,4.5vw,38px)':wlen<=26?'clamp(15px,3.5vw,26px)':'clamp(12px,2.8vw,20px)';
      mod.insertAdjacentHTML('beforeend',
        '<div class="stage" style="margin-bottom:12px">'+
          '<div class="stage-lang">'+shownLang+'</div>'+
          '<div class="stage-word" style="font-size:'+wfont+'">'+shown+'</div>'+
          (w.note&&d==='ru2en'?'<div class="stage-note">'+w.note+'</div>':'')+
          '<div class="stage-lv" style="color:'+lvColor(w.lv)+'">'+lvLabel(w.lv)+'</div>'+
          '<div id="shear" style="margin-top:8px"></div></div>'+
        '<div class="kbd-hint">Type in '+(d==='ru2en'?'English 🇬🇧':'Russian 🇷🇺')+'</div>'+
        '<div style="margin-bottom:8px"><input type="text" class="vocab-input" id="sinput" placeholder="Type fast…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/></div>'+
        '<div id="sfb" style="min-height:16px;font-size:12px;color:var(--muted);margin-bottom:6px"></div>'+
        '<div id="sres"></div>'
      );
      if(d==='ru2en') document.getElementById('shear').appendChild(hearBtn(w.ru,0.90,'Hear'));
      setTimeout(function(){var i=document.getElementById('sinput');if(i)i.focus();},80);
      var done=false;
      function advance(got){
        if(done)return;done=true;stopTimer();scores[idx]=got;
        if(got){streak++;if(streak>=3)comboFlash('🔥×'+streak);}else streak=0;
        var res=document.getElementById('sres'),inp=document.getElementById('sinput');
        if(inp)inp.disabled=true;
        if(res){
          if(got) res.innerHTML='<div class="rbox great" style="text-align:center;padding:8px">✓ Correct!</div>';
          else    res.innerHTML='<div class="rbox miss"  style="text-align:center;padding:8px">⏰ Time! &nbsp; Answer: <strong>'+firstAlt(answer)+'</strong></div>';
        }
        setTimeout(function(){idx++;renderQ();},got?550:1500);
      }
      var inp=document.getElementById('sinput');
      if(inp){
        inp.addEventListener('input',function(){if(done)return;if(checkTyped(this.value,answer)!=='miss'){advance(true);}else if(this.value.length>=2){var fb=document.getElementById('sfb');if(fb)fb.textContent='Keep going…';}});
        inp.addEventListener('keydown',function(e){if(e.key!=='Enter'||done)return;advance(checkTyped(this.value,answer)!=='miss');});
      }
      var remaining=TIME;
      timerIv=setInterval(function(){
        remaining--;
        var bar=document.getElementById('stbar');
        if(bar){bar.style.width=Math.max(0,remaining/TIME*100)+'%';if(remaining<=3)bar.classList.add('warn');}
        if(remaining<=0)advance(false);
      },1000);
    }
    function renderSpeedDone(){
      var nc=scores.filter(function(s){return s;}).length,acc=Math.round(nc/items.length*100);
      var grd=acc>=90?'S':acc>=80?'A':acc>=65?'B':acc>=50?'C':'D',gc=gradeColor(grd);
      var review=items.map(function(item,i){
        var ok=scores[i],col=ok?'#6ddb88':'#ff7070';
        return '<div style="display:flex;gap:8px;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)">'+
          '<span style="color:'+col+';min-width:20px">'+(ok?'✓':'✗')+'</span>'+
          '<span style="font-family:Playfair Display,serif;font-size:14px">'+item.word.ru+'</span>'+
          '<span style="color:var(--muted);font-size:12px;margin-left:auto">'+firstAlt(item.word.en)+'</span></div>';
      }).join('');
      mod.innerHTML='<div class="done-wrap"><div style="font-size:48px;margin-bottom:12px">⚡</div>'+
        '<div style="font-family:Playfair Display,serif;font-size:80px;color:'+gc+';text-shadow:0 0 30px '+gc+'88;line-height:1">'+grd+'</div>'+
        '<div style="font-family:Playfair Display,serif;font-size:24px;margin:8px 0 4px">'+acc+'%</div>'+
        '<div style="font-size:13px;color:var(--muted);margin-bottom:2px">'+nc+' / '+items.length+' correct</div>'+
        '<div style="font-size:11px;color:var(--muted);margin-bottom:6px">'+lvLabel(lv)+'</div>'+
        '<div class="done-msg">'+gradeMsg(acc)+'</div>'+
        '<div style="display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin:20px 0 24px">'+
          '<button class="btn btn-out" id="db2">← Menu</button>'+
          '<button class="btn btn-red" id="da2">Again ⚡</button></div>'+
        '<div style="text-align:left;background:var(--card);border:1.5px solid var(--border);border-radius:4px;padding:12px 14px">'+
        '<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Review</div>'+
        review+'</div></div>';
      document.getElementById('db2').onclick=renderMain;
      document.getElementById('da2').onclick=function(){startSpeed(getPool());};
    }
  }

  function startChallenge(pool){
    var idx=0,nCorrect=0,total=0,streak=0,best=0;
    renderQ();
    function renderQ(){
      if(idx>=pool.length){renderDoneScreen(nCorrect,total,streak,best,true);return;}
      mod.innerHTML='';
      var item=pool[idx],s=item.sent,d=item.d;
      var shown=d==='ru2en'?s.ru:firstAlt(s.en),answer=d==='ru2en'?s.en:s.ru,shownLang=d==='ru2en'?'Russian':'English';
      var pct=Math.round(idx/pool.length*100);
      mod.insertAdjacentHTML('beforeend',
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
          '<div style="font-size:11px;color:var(--orange-l);font-weight:600">🔥 Challenge · '+theme.label+'</div>'+
          '<button class="btn-ghost" id="cback">← Menu</button></div>'+
        '<div class="pbar-wrap"><div class="pbar-fill" style="background:var(--orange-l);width:'+pct+'%"></div></div>'+
        '<div class="pctr">'+(idx+1)+' / '+pool.length+'</div>'+
        '<div class="stats-hud">'+
          '<div><div class="stat-val" style="color:var(--orange-l)">'+nCorrect+'</div><div class="stat-lbl">Correct</div></div>'+
          '<div><div class="stat-val">'+total+'</div><div class="stat-lbl">Done</div></div>'+
          '<div><div class="stat-val" style="color:var(--orange-l)">🔥 '+streak+'</div><div class="stat-lbl">Streak</div></div>'+
          (total>0?'<div><div class="stat-val">'+Math.round(nCorrect/total*100)+'%</div><div class="stat-lbl">Accuracy</div></div>':'')+
        '</div>'
      );
      document.getElementById('cback').onclick=renderMain;
      var sfont=shown.length<=35?'clamp(17px,4vw,26px)':'clamp(13px,3.2vw,19px)';
      mod.insertAdjacentHTML('beforeend',
        '<div class="challenge-stage">'+
          '<div class="challenge-label">'+shownLang+' — translate the sentence</div>'+
          '<div class="challenge-sent" style="font-size:'+sfont+'">'+shown+'</div>'+
          '<div id="chear" style="margin-top:12px"></div></div>'+
        '<div class="kbd-hint">Type in '+(d==='ru2en'?'English 🇬🇧':'Russian 🇷🇺')+'</div>'+
        '<div style="margin-bottom:10px"><input type="text" class="vocab-input" id="cinput" placeholder="Your translation…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="font-size:15px"/></div>'+
        '<div style="display:flex;gap:8px;margin-bottom:12px">'+
          '<button class="btn btn-orange" id="csubmit">Check ✓</button>'+
          '<button class="btn btn-out btn-sm" id="cskip">Skip</button></div>'+
        '<div id="cresult"></div>'
      );
      if(d==='ru2en') document.getElementById('chear').appendChild(hearBtn(s.ru,0.75,'Hear'));
      setTimeout(function(){var i=document.getElementById('cinput');if(i)i.focus();},80);
      document.getElementById('cskip').onclick=function(){idx++;renderQ();};
      var submitted=false;
      function submit(){
        if(submitted){idx++;renderQ();return;}
        var inp=document.getElementById('cinput');if(!inp)return;
        var chk=checkSentence(inp.value,answer);submitted=true;total++;
        var res=document.getElementById('cresult'),sbtn=document.getElementById('csubmit');
        if(chk.result==='exact'){
          nCorrect++;streak++;if(streak>best)best=streak;inp.className='vocab-input ok';
          if(streak>=3)comboFlash('🔥×'+streak);
          res.innerHTML='<div class="rbox great"><span class="rscore">✓</span>Great translation!'+(streak>=3?' <span style="color:var(--orange-l)">🔥×'+streak+'</span>':'')+'</div>';
        } else if(chk.result==='close'){
          nCorrect++;streak++;if(streak>best)best=streak;inp.className='vocab-input close';
          res.innerHTML='<div class="rbox close"><span class="rscore">≈</span>Close enough!<div class="rinfo">Reference: <em>'+firstAlt(answer)+'</em></div></div>';
        } else {
          streak=0;inp.className='vocab-input no';
          res.innerHTML='<div class="rbox miss"><span class="rscore">✗</span>Not quite.<div class="rinfo">Reference: <em>'+firstAlt(answer)+'</em></div></div>';
        }
        sbtn.textContent='Next →';
        if(d==='ru2en'){var hr=document.getElementById('chear');if(hr&&!hr.querySelector('.hear-btn'))hr.appendChild(hearBtn(s.ru,0.70,'Hear again'));}
      }
      document.getElementById('csubmit').onclick=submit;
      document.getElementById('cinput').addEventListener('keydown',function(e){if(e.key==='Enter')submit();});
    }
  }

  function renderDoneScreen(nc,tot,stk,bst,isChallenge){
    var acc=tot>0?Math.round(nc/tot*100):0;
    var grd=acc>=90?'S':acc>=80?'A':acc>=65?'B':acc>=50?'C':'D',gc=gradeColor(grd);
    mod.innerHTML='<div class="done-wrap">'+
      '<div style="font-size:48px;margin-bottom:12px">'+(isChallenge?'🔥':theme.icon)+'</div>'+
      '<div style="font-family:Playfair Display,serif;font-size:80px;color:'+gc+';text-shadow:0 0 30px '+gc+'88;line-height:1">'+grd+'</div>'+
      '<div style="font-family:Playfair Display,serif;font-size:24px;margin:8px 0 4px">'+acc+'% accuracy</div>'+
      '<div style="font-size:13px;color:var(--muted);margin-bottom:2px">'+nc+' / '+tot+' correct &nbsp;·&nbsp; Best streak 🔥'+bst+'</div>'+
      '<div style="font-size:11px;color:var(--muted);margin-bottom:6px">'+lvLabel(lv)+'</div>'+
      '<div class="done-msg">'+gradeMsg(acc)+'</div>'+
      '<div style="display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:22px">'+
        '<button class="btn btn-out" id="dnback">← Menu</button>'+
        '<button class="btn '+(isChallenge?'btn-orange':'btn-ink')+'" id="dnagain">Again '+(isChallenge?'🔥':'🔄')+'</button></div></div>';
    document.getElementById('dnback').onclick=renderMain;
    document.getElementById('dnagain').onclick=function(){
      var p=getPool();if(isChallenge)startChallenge(p);else if(mode==='speed')startSpeed(p);else startTyping(p);
    };
  }

  renderMain();
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
showTab('greetings');
</script>
